<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC Master | MAIDI Project</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --maidi-cyan: #2dd4bf;
            --maidi-gold: #fbbf24;
            --maidi-purple: #a855f7;
            --bg-deep: #020617;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: var(--bg-deep); 
            color: #f1f5f9; margin: 0; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
        }
        .ancient { font-family: 'Cinzel', serif; }

        /* --- LOGO: ÓRBITAS SAGRADAS (VERSION REFORZADA) --- */
        .logo-container {
            position: relative; width: 200px; height: 200px;
            display: flex; align-items: center; justify-content: center;
        }

        /* Estela Exterior (Cian) - Sentido Horario */
        .orbit-outer {
            position: absolute; width: 100%; height: 100%;
            border: 2px solid rgba(45, 212, 191, 0.1); border-radius: 50%;
        }
        .orbit-outer::after {
            content: ""; position: absolute; inset: -2px;
            border: 3px solid transparent; border-top: 3px solid var(--maidi-cyan);
            border-radius: 50%; animation: rotate-cw 3s linear infinite;
            filter: drop-shadow(0 0 8px var(--maidi-cyan));
        }

        /* Estela Interior (Oro) - Sentido Anti-horario */
        .orbit-inner {
            position: absolute; width: 75%; height: 75%;
            border: 2px solid rgba(251, 191, 36, 0.1); border-radius: 50%;
        }
        .orbit-inner::after {
            content: ""; position: absolute; inset: -2px;
            border: 3px solid transparent; border-bottom: 3px solid var(--maidi-gold);
            border-radius: 50%; animation: rotate-ccw 2s linear infinite;
            filter: drop-shadow(0 0 8px var(--maidi-gold));
        }

        .yin-yang-icon {
            font-size: 4.5rem; color: white; z-index: 50;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.5));
        }

        @keyframes rotate-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        /* --- QI PARTICLES --- */
        .qi-particle {
            position: absolute; bottom: -20px; border-radius: 50%;
            background: radial-gradient(circle, var(--maidi-cyan) 0%, transparent 70%);
            opacity: 0.2; pointer-events: none; animation: float-up 10s infinite ease-in;
        }
        @keyframes float-up {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 0.3; }
            100% { transform: translateY(-110vh) scale(2); opacity: 0; }
        }

        /* --- UI ELEMENTS --- */
        .glass {
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .glass:hover { border-color: var(--maidi-cyan); transform: translateY(-3px); }

        .btn-start {
            padding: 20px 80px; border-radius: 60px; border: 2px solid var(--maidi-cyan);
            color: var(--maidi-cyan); text-transform: uppercase; letter-spacing: 6px;
            font-weight: bold; transition: 0.5s; cursor: pointer;
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.2);
        }
        .btn-start:hover { background: var(--maidi-cyan); color: #000; box-shadow: 0 0 50px var(--maidi-cyan); }

        .screen { position: fixed; inset: 0; transition: 0.7s ease-in-out; display: flex; flex-direction: column; z-index: 100; }
        .hidden-screen { opacity: 0; pointer-events: none; transform: scale(0.95) translateY(20px); }

        #oracle-layer {
            position: fixed; inset: 0; z-index: 2000; background: #020617;
            display: none; align-items: center; justify-content: center; text-align: center; padding: 40px;
        }

        .orb-cultivation {
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--maidi-gold);
            position: relative; overflow: hidden; box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }
        .orb-water {
            position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, var(--maidi-gold), var(--maidi-cyan));
            transition: height 1.5s ease-in-out; height: 50%;
        }
    </style>
</head>
<body class="max-w-md mx-auto h-screen relative border-x border-white/5 overflow-hidden">

    <div id="particles" class="absolute inset-0 pointer-events-none"></div>

    <!-- PANTALLA 1: INICIO -->
    <div id="scr-start" class="screen items-center justify-center">
        <div class="logo-container mb-16">
            <div class="orbit-outer"></div>
            <div class="orbit-inner"></div>
            <i class="fas fa-yin-yang yin-yang-icon"></i>
        </div>
        <h1 class="ancient text-4xl tracking-[12px] text-white text-center mb-4">MTC MASTER</h1>
        <p class="text-[10px] tracking-[6px] text-cyan-400 uppercase mb-20 opacity-60">MAIDI Project</p>
        <button onclick="openOracle()" class="btn-start">Entrar</button>
    </div>

    <!-- CAPA ORÁCULO -->
    <div id="oracle-layer">
        <div class="ancient text-amber-500 text-xs tracking-[8px] mb-8">SABIDURÍA</div>
        <p id="oracle-text" class="text-2xl text-white italic font-light leading-relaxed px-6"></p>
    </div>

    <!-- PANTALLA 2: PABELLÓN (FULL DESBLOQUEADO) -->
    <div id="scr-pabellon" class="screen hidden-screen p-8 pt-16 overflow-y-auto">
        <div class="flex justify-between items-center mb-12">
            <div>
                <h2 class="ancient text-3xl text-white">El Templo</h2>
                <span class="text-[10px] text-cyan-500 font-bold uppercase tracking-widest">Maestro de los Canales</span>
            </div>
            <div class="orb-cultivation">
                <div class="orb-water"></div>
                <div class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-white">QI</div>
            </div>
        </div>

        <div class="space-y-4 pb-12">
            <div onclick="showScreen('scr-mini')" class="glass p-6 flex items-center gap-6 border-l-4 border-purple-500">
                <i class="fas fa-gamepad text-2xl text-purple-400"></i>
                <div>
                    <h4 class="text-sm font-bold uppercase text-white">Cámara de Pruebas</h4>
                    <p class="text-[10px] text-slate-400">Minijuegos y entrenamiento.</p>
                </div>
            </div>

            <div onclick="initDojo()" class="glass p-6 flex items-center gap-6 border-l-4 border-cyan-500">
                <i class="fas fa-bolt text-2xl text-cyan-400"></i>
                <div>
                    <h4 class="text-sm font-bold uppercase text-white">Senda del Guerrero</h4>
                    <p class="text-[10px] text-slate-400">Diagnóstico y casos clínicos.</p>
                </div>
            </div>

            <div class="glass p-6 flex items-center gap-6 border-l-4 border-emerald-500">
                <i class="fas fa-scroll text-2xl text-emerald-400"></i>
                <div>
                    <h4 class="text-sm font-bold uppercase text-white">Atlas de Jade</h4>
                    <p class="text-[10px] text-slate-400">Enciclopedia técnica.</p>
                </div>
            </div>

            <div class="glass p-6 flex items-center gap-6 border-l-4 border-amber-500">
                <i class="fas fa-dragon text-2xl text-amber-500"></i>
                <div>
                    <h4 class="text-sm font-bold uppercase text-white">Ranking</h4>
                    <p class="text-[10px] text-slate-400">Hermanos en el camino.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- PANTALLA 3: MINIJUEGOS -->
    <div id="scr-mini" class="screen hidden-screen p-8 pt-16">
        <button onclick="showScreen('scr-pabellon')" class="text-slate-500 mb-8"><i class="fas fa-arrow-left mr-2"></i> VOLVER</button>
        <h2 class="ancient text-2xl text-white mb-8">Cámara de Pruebas</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-6 text-center flex flex-col items-center gap-3">
                <i class="fas fa-link text-purple-400"></i>
                <span class="text-[10px] font-bold">PARES</span>
            </div>
            <div class="glass p-6 text-center flex flex-col items-center gap-3">
                <i class="fas fa-bullseye text-cyan-400"></i>
                <span class="text-[10px] font-bold">LOCALIZA</span>
            </div>
        </div>
    </div>

    <script>
        const DATA = {
            quotes: [
                "El médico superior previene la enfermedad.",
                "En la calma, el Qi fluye sin esfuerzo.",
                "La lengua es el espejo de tu interior.",
                "El equilibrio es el lenguaje del Universo."
            ]
        };

        function openOracle() {
            const layer = document.getElementById('oracle-layer');
            const text = document.getElementById('oracle-text');
            text.innerText = DATA.quotes[Math.floor(Math.random() * DATA.quotes.length)];
            layer.style.display = 'flex';
            layer.style.opacity = '0';
            
            setTimeout(() => { layer.style.transition = 'opacity 1s'; layer.style.opacity = '1'; }, 10);
            
            setTimeout(() => {
                layer.style.opacity = '0';
                setTimeout(() => {
                    layer.style.display = 'none';
                    showScreen('scr-pabellon');
                }, 1000);
            }, 3000);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden-screen'));
            document.getElementById(id).classList.remove('hidden-screen');
        }

        // Crear Qi dinámico
        const partBox = document.getElementById('particles');
        for(let i=0; i<20; i++){
            const p = document.createElement('div');
            p.className = 'qi-particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.width = p.style.height = (Math.random() * 12 + 4) + 'px';
            p.style.animationDelay = Math.random() * 8 + 's';
            partBox.appendChild(p);
        }

        function initDojo() {
            alert("Senda del Guerrero Iniciada - 20s de tiempo activados.");
            showScreen('scr-pabellon'); // Demo logic
        }
    </script>
</body>
</html>
