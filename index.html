<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC Master Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap');
        
        :root { --primary: #10b981; --dark: #1e293b; }
        body { font-family: 'Quicksand', sans-serif; background: #f0f2f5; margin: 0; overflow: hidden; }

        /* Splash Screen Effect */
        #splash {
            position: fixed; inset: 0; background: white; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.5s;
        }
        .splash-exit { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        /* Animations */
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .orb-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* UI Components */
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .tab-content { display: none; height: calc(100vh - 160px); overflow-y: auto; padding-bottom: 80px; }
        .active-tab { display: block; }
    </style>
</head>
<body class="max-w-md mx-auto bg-white shadow-2xl h-screen relative">

    <!-- PANTALLA DE PRESENTACIÓN (SPLASH) -->
    <div id="splash">
        <div class="orb-float bg-emerald-100 p-8 rounded-full mb-4">
            <i class="fas fa-yin-yang text-6xl text-emerald-500"></i>
        </div>
        <h1 class="text-3xl font-bold text-slate-800 tracking-tight">MTC <span class="text-emerald-500">Master</span></h1>
        <p class="text-slate-400 mt-2 italic text-sm">El camino del equilibrio</p>
        <button onclick="startApp()" class="mt-12 bg-emerald-500 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-emerald-600 transition">
            EMPEZAR
        </button>
    </div>

    <!-- HEADER / STATS -->
    <header class="p-4 glass border-b sticky top-0 z-30">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center text-white font-bold shadow-inner" id="lvl-badge">1</div>
                <div>
                    <p class="text-[10px] uppercase font-bold text-slate-400">Progreso Vital</p>
                    <div class="w-24 h-2 bg-gray-200 rounded-full mt-1">
                        <div id="xp-bar" class="bg-emerald-500 h-full rounded-full transition-all duration-500" style="width: 10%"></div>
                    </div>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="text-center">
                    <p class="text-[10px] font-bold text-orange-400 uppercase">Fuego</p>
                    <span id="streak" class="font-bold text-slate-700 leading-none">0</span>
                </div>
                <div class="text-center">
                    <p class="text-[10px] font-bold text-blue-400 uppercase">Orbes</p>
                    <span id="orb-count" class="font-bold text-slate-700 leading-none">0</span>
                </div>
            </div>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="p-4 h-full">
        <!-- SECCIÓN QUIZ -->
        <section id="quiz" class="tab-content active-tab fade-in">
            <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 shadow-sm text-center mb-6">
                <p id="q-category" class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-2">Diagnóstico Zang-Fu</p>
                <h2 id="q-text" class="text-xl font-bold text-slate-800">Cargando desafío...</h2>
            </div>
            <div id="q-options" class="grid gap-3"></div>
        </section>

        <!-- SECCIÓN ATLAS (MERIDIANOS) -->
        <section id="atlas" class="tab-content fade-in">
            <h3 class="font-bold text-slate-800 mb-4">Atlas de Meridianos</h3>
            <div id="meridians-list" class="space-y-3"></div>
        </section>

        <!-- SECCIÓN DIETA (CONSEJOS) -->
        <section id="dieta" class="tab-content fade-in">
            <h3 class="font-bold text-slate-800 mb-4">Dietética Energética</h3>
            <div id="diet-list" class="grid grid-cols-2 gap-3"></div>
        </section>

        <!-- SECCIÓN COLECCIÓN (RECOMPENSAS) -->
        <section id="skills" class="tab-content fade-in">
            <h3 class="font-bold text-slate-800 mb-2">Tu Alquimia</h3>
            <p class="text-xs text-slate-400 mb-6">Desbloquea orbes respondiendo correctamente.</p>
            <div id="collection-grid" class="grid grid-cols-3 gap-4"></div>
        </section>
    </main>

    <!-- NAVEGACIÓN -->
    <nav class="fixed bottom-0 max-w-md w-full bg-white border-t flex justify-around p-3 pb-6 z-40">
        <button onclick="showTab('quiz')" class="text-emerald-500 flex flex-col items-center"><i class="fas fa-brain text-xl"></i><span class="text-[9px] font-bold mt-1">QUIZ</span></button>
        <button onclick="showTab('atlas')" class="text-slate-400 flex flex-col items-center"><i class="fas fa-map text-xl"></i><span class="text-[9px] font-bold mt-1">ATLAS</span></button>
        <button onclick="showTab('dieta')" class="text-slate-400 flex flex-col items-center"><i class="fas fa-leaf text-xl"></i><span class="text-[9px] font-bold mt-1">DIETA</span></button>
        <button onclick="showTab('skills')" class="text-slate-400 flex flex-col items-center"><i class="fas fa-gem text-xl"></i><span class="text-[9px] font-bold mt-1">ORBES</span></button>
    </nav>

    <script>
        // --- DATA STORE ---
        const DATA = {
            questions: [
                { s: "Cara roja, sed de agua fría, lengua roja con capa amarilla", r: "Calor Pleno", cat: "Ocho Principios" },
                { s: "Sudoración espontánea, respiración corta, cara pálida", r: "Def. Qi de Pulmón", cat: "Zang-Fu" },
                { s: "Dolor punzante fijo, lengua violácea, pulso rugoso", r: "Estasis de Sangre", cat: "Patología" }
            ],
            meridians: [
                { n: "Pulmón (P)", p: "11 puntos", e: "Metal", desc: "Gobierna el Qi y la respiración." },
                { n: "Intestino Grueso (IG)", p: "20 puntos", e: "Metal", desc: "Transporte de desechos." },
                { n: "Estómago (E)", p: "45 puntos", e: "Tierra", desc: "Mar de los cereales y fluidos." }
            ],
            diet: [
                { t: "Alimentos Fríos", c: "Sandía, Pepino", u: "Para Calor de Estómago" },
                { t: "Alimentos Calientes", c: "Jengibre, Canela", u: "Para Frío en Útero" },
                { t: "Sabor Dulce", c: "Arroz, Calabaza", u: "Tonifica el Bazo" }
            ],
            orbs: [
                { n: "Orbe de Madera", color: "bg-green-400", icon: "fa-tree", unlocked: false },
                { n: "Orbe de Fuego", color: "bg-red-400", icon: "fa-fire", unlocked: false },
                { n: "Orbe de Tierra", color: "bg-yellow-400", icon: "fa-mountain", unlocked: false }
            ]
        };

        let state = { xp: 0, streak: 0, orbs: 0, currentQ: 0 };

        // --- LÓGICA DE NAVEGACIÓN ---
        function startApp() {
            document.getElementById('splash').classList.add('splash-exit');
            loadQuiz();
            loadAtlas();
            loadDiet();
            renderOrbs();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-emerald-500', 'text-slate-400'));
            event.currentTarget.classList.replace('text-slate-400', 'text-emerald-500');
        }

        // --- LÓGICA DE CONTENIDO ---
        function loadQuiz() {
            const q = DATA.questions[state.currentQ];
            document.getElementById('q-text').innerText = `"${q.s}"`;
            document.getElementById('q-category').innerText = q.cat;
            const options = [...new Set(DATA.questions.map(x => x.r))];
            
            document.getElementById('q-options').innerHTML = options.map(opt => `
                <button onclick="check('${opt}')" class="bg-white border-2 border-slate-100 p-4 rounded-2xl font-bold text-slate-600 hover:border-emerald-400 transition shadow-sm">
                    ${opt}
                </button>
            `).join('');
        }

        function check(ans) {
            if(ans === DATA.questions[state.currentQ].r) {
                state.xp += 35;
                state.streak++;
                if(state.streak % 3 === 0) unlockRandomOrb();
                state.currentQ = (state.currentQ + 1) % DATA.questions.length;
                updateStats();
                loadQuiz();
            } else {
                state.streak = 0;
                alert("La energía no fluye... intenta de nuevo.");
                updateStats();
            }
        }

        function loadAtlas() {
            document.getElementById('meridians-list').innerHTML = DATA.meridians.map(m => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-center mb-2">
                        <h4 class="font-bold text-emerald-600">${m.n}</h4>
                        <span class="text-[10px] bg-slate-100 px-2 py-1 rounded-full font-bold">${m.e}</span>
                    </div>
                    <p class="text-xs text-slate-500">${m.desc}</p>
                    <p class="text-[10px] text-emerald-400 mt-2 font-bold uppercase">${m.p}</p>
                </div>
            `).join('');
        }

        function loadDiet() {
            document.getElementById('diet-list').innerHTML = DATA.diet.map(d => `
                <div class="bg-emerald-50 p-4 rounded-2xl">
                    <p class="font-bold text-xs text-emerald-700 mb-1">${d.t}</p>
                    <p class="text-[10px] text-emerald-600 opacity-80 mb-2">${d.c}</p>
                    <p class="text-[9px] italic text-slate-500 leading-tight">${d.u}</p>
                </div>
            `).join('');
        }

        function unlockRandomOrb() {
            const locked = DATA.orbs.filter(o => !o.unlocked);
            if(locked.length > 0) {
                locked[0].unlocked = true;
                state.orbs++;
                renderOrbs();
                alert(`¡Has manifestado el ${locked[0].n}!`);
            }
        }

        function renderOrbs() {
            document.getElementById('orb-count').innerText = state.orbs;
            document.getElementById('collection-grid').innerHTML = DATA.orbs.map(o => `
                <div class="flex flex-col items-center">
                    <div class="w-16 h-16 rounded-full flex items-center justify-center text-white text-xl shadow-lg ${o.unlocked ? o.color : 'bg-slate-200'} transition-all duration-1000">
                        <i class="fas ${o.unlocked ? o.icon : 'fa-lock opacity-30'}"></i>
                    </div>
                    <p class="text-[8px] font-bold mt-2 uppercase ${o.unlocked ? 'text-slate-700' : 'text-slate-300'}">${o.n}</p>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('streak').innerText = state.streak;
            const lvl = Math.floor(state.xp / 100) + 1;
            document.getElementById('lvl-badge').innerText = lvl;
            document.getElementById('xp-bar').style.width = (state.xp % 100) + "%";
        }
    </script>
</body>
</html>
