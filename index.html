<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC Master | MAIDI Project</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --maidi-cyan: #2dd4bf;
            --maidi-gold: #fbbf24;
            --maidi-purple: #a855f7;
            --maidi-red: #f43f5e;
            --maidi-green: #10b981;
            --bg-deep: #020617;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: var(--bg-deep); color: #f1f5f9; margin: 0; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
        }
        .ancient { font-family: 'Cinzel', serif; }

        /* --- LOGO Y YIN-YANG CON PULSO (PRESERVADO) --- */
        .logo-container { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .orbit-outer::after {
            content: ""; position: absolute; inset: -4px; border-radius: 50%;
            border: 4px solid transparent; border-top: 4px solid var(--maidi-cyan);
            animation: rotate-cw 3s linear infinite; filter: drop-shadow(0 0 10px var(--maidi-cyan));
        }
        .orbit-inner::after {
            content: ""; position: absolute; inset: 4px; border-radius: 50%;
            border: 4px solid transparent; border-bottom: 4px solid var(--maidi-gold);
            animation: rotate-ccw 2s linear infinite; filter: drop-shadow(0 0 10px var(--maidi-gold));
        }
        .yinyang-pulse { animation: pulse-yin 2s infinite ease-in-out; font-size: 4rem; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
        @keyframes rotate-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes pulse-yin { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }

        /* --- BOTÓN NEÓN ORIGINAL (PRESERVADO) --- */
        .btn-neon {
            background: #000; border: 2px solid var(--maidi-cyan); color: var(--maidi-cyan);
            padding: 15px 50px; border-radius: 50px; text-transform: uppercase; letter-spacing: 5px;
            font-weight: bold; box-shadow: inset 0 0 10px var(--maidi-cyan), 0 0 15px var(--maidi-cyan);
            transition: 0.4s; cursor: pointer;
        }
        .btn-neon:hover { background: var(--maidi-cyan); color: #000; box-shadow: 0 0 40px var(--maidi-cyan); }

        /* --- UI GLASS --- */
        .glass {
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px;
            transition: 0.4s; cursor: pointer;
        }
        .glass:hover { border-color: var(--maidi-cyan); transform: translateY(-2px); }

        /* --- PANTALLAS --- */
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; z-index: 100; transition: 0.5s; background: transparent; }
        .hidden-screen { opacity: 0; pointer-events: none; transform: scale(1.02); }

        /* --- CAPA CARGA (SABIDURÍA PRESERVADA) --- */
        #loading-screen { background: #000; z-index: 2000; display: none; align-items: center; justify-content: center; text-align: center; padding: 40px; flex-direction: column; }

        /* --- BOLA DE QI Y KARMA --- */
        .qi-ball { width: 50px; height: 50px; background: radial-gradient(circle, var(--maidi-cyan) 0%, transparent 70%); border-radius: 50%; animation: pulse-qi 2s infinite; }
        @keyframes pulse-qi { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.5); } }

        /* --- SILUETA PARA LOCALIZACIÓN --- */
        .human-silhouette { height: 320px; fill: none; stroke: var(--maidi-cyan); stroke-width: 1.5; filter: drop-shadow(0 0 8px var(--maidi-cyan)); }
    </style>
</head>
<body class="max-w-md mx-auto h-screen relative">

    <div id="loading-screen" class="screen">
        <p id="wisdom-text" class="ancient text-amber-500 text-xl italic mb-8 px-10"></p>
        <div class="qi-ball"></div>
        <p class="text-[10px] tracking-[4px] text-cyan-400 mt-6 uppercase opacity-50">Sincronizando Meridianos</p>
    </div>

    <div id="scr-start" class="screen items-center justify-center">
        <div class="logo-container mb-12">
            <div class="orbit-outer absolute inset-0"></div>
            <div class="orbit-inner absolute inset-0"></div>
            <i class="fas fa-yin-yang yinyang-pulse text-white z-50"></i>
        </div>
        <h1 class="ancient text-4xl tracking-[10px] text-white">MTC MASTER</h1>
        <p class="text-[12px] tracking-[6px] text-cyan-400 mt-2 uppercase">MAIDI Project</p>
        <button onclick="navTo('scr-pabellon')" class="btn-neon mt-16">Entrar</button>
    </div>

    <div id="scr-pabellon" class="screen hidden-screen p-8 pt-16 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="ancient text-3xl text-white">El Templo</h2>
                <p class="text-[9px] text-cyan-500 tracking-[3px] uppercase">Pabellón Central</p>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-[10px] text-cyan-400 font-bold">QI: 1200</span>
                <span class="text-[10px] text-purple-400 font-bold">KARMA: 85</span>
                <div class="qi-ball mt-2"></div>
            </div>
        </div>

        <div class="space-y-4 pb-10">
            <div onclick="navTo('scr-games')" class="glass p-6 flex items-center gap-5 border-l-4 border-purple-500">
                <i class="fas fa-gamepad text-2xl text-purple-400"></i>
                <h4 class="text-xs font-bold uppercase tracking-widest text-white">Cámara de Pruebas</h4>
            </div>
            <div onclick="navTo('scr-atlas')" class="glass p-6 flex items-center gap-5 border-l-4 border-emerald-500">
                <i class="fas fa-scroll text-2xl text-emerald-400"></i>
                <h4 class="text-xs font-bold uppercase tracking-widest text-white">Atlas de Jade</h4>
            </div>
            <div onclick="navTo('scr-social')" class="glass p-6 flex items-center gap-5 border-l-4 border-indigo-500">
                <i class="fas fa-users text-2xl text-indigo-400"></i>
                <h4 class="text-xs font-bold uppercase tracking-widest text-white">Hermandad Social</h4>
            </div>
            <div onclick="navTo('scr-medals')" class="glass p-6 flex items-center gap-5 border-l-4 border-amber-500">
                <i class="fas fa-medal text-2xl text-amber-500"></i>
                <h4 class="text-xs font-bold uppercase tracking-widest text-white">Coleccionables</h4>
            </div>
        </div>
    </div>

    <div id="scr-games" class="screen hidden-screen p-8 pt-16">
        <button onclick="navTo('scr-pabellon')" class="text-slate-500 text-xs mb-8 uppercase tracking-widest"><i class="fas fa-arrow-left mr-2"></i> Volver</button>
        <h2 class="ancient text-2xl text-white mb-8">Cámara de Pruebas</h2>
        <div class="grid grid-cols-1 gap-4">
            <div onclick="navTo('scr-loc')" class="glass p-5 flex justify-between items-center border-b-2 border-cyan-500">
                <span class="text-[10px] font-bold text-white uppercase">Localización GPS (Silueta)</span>
                <i class="fas fa-crosshairs text-cyan-400"></i>
            </div>
            <div onclick="navTo('scr-pairs')" class="glass p-5 flex justify-between items-center border-b-2 border-purple-500">
                <span class="text-[10px] font-bold text-white uppercase">Duelo de Pares</span>
                <i class="fas fa-link text-purple-400"></i>
            </div>
        </div>
    </div>

    <div id="scr-loc" class="screen hidden-screen p-8 pt-16 items-center">
        <button onclick="navTo('scr-games')" class="self-start text-slate-500 text-xs mb-8 uppercase tracking-widest">Regresar</button>
        <h3 id="loc-task" class="ancient text-xl text-white text-center mb-10">Localiza el punto: IG4</h3>
        <div class="relative">
            <svg class="human-silhouette" viewBox="0 0 200 500">
                <circle cx="100" cy="50" r="30" /> <path d="M100,80 L100,250 M100,100 L40,150 M100,100 L160,150 M100,250 L60,450 M100,250 L140,450" /> </svg>
            <div onclick="alert('¡Punto Encontrado! +20 Qi')" style="position:absolute; top:30%; left:25%; width:20px; height:20px; border:2px solid var(--maidi-red); border-radius:50%; cursor:pointer; box-shadow:0 0 10px var(--maidi-red);"></div>
        </div>
    </div>

    <script>
        const wisdoms = [
            "El médico superior previene la enfermedad, el médico mediocre la cura.",
            "En la calma total, el Qi fluye como un río de plata.",
            "La lengua es el espejo donde se refleja el corazón.",
            "Domina el Yin, abraza el Yang, encuentra el equilibrio."
        ];

        // SISTEMA DE NAVEGACIÓN CON SABIDURÍA (AUTOMATIZADO)
        function navTo(screenId) {
            const loader = document.getElementById('loading-screen');
            const wisdomBox = document.getElementById('wisdom-text');
            
            // 1. Mostrar Proverbio
            wisdomBox.innerText = `"${wisdoms[Math.floor(Math.random() * wisdoms.length)]}"`;
            loader.style.display = 'flex';
            loader.style.opacity = '1';

            // 2. Transición de fondo
            setTimeout(() => {
                document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden-screen'));
                document.getElementById(screenId).classList.remove('hidden-screen');
                
                // 3. Ocultar Loader
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            }, 1800); // 1.8 segundos de meditación
        }

        // Partículas Qi permanentes
        function createQi() {
            const bg = document.body;
            for(let i=0; i<15; i++) {
                const dot = document.createElement('div');
                dot.style.cssText = `position:fixed; width:2px; height:2px; background:var(--maidi-cyan); left:${Math.random()*100}vw; top:${Math.random()*100}vh; opacity:0.2; pointer-events:none;`;
                bg.appendChild(dot);
            }
        }
        createQi();
    </script>
</body>
</html>
