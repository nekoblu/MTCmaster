<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC Master | MAIDI Project</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --maidi-cyan: #2dd4bf;
            --maidi-gold: #fbbf24;
            --maidi-purple: #a855f7;
            --bg-deep: #020617;
        }

        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg-deep); color: #f1f5f9; margin: 0; overflow: hidden; }
        .ancient { font-family: 'Cinzel', serif; }

        /* --- CONOCIMIENTO ASCENDENTE (RESTAURADO) --- */
        .knowledge-particle {
            position: absolute; bottom: -20px; background: white; border-radius: 50%;
            opacity: 0.3; filter: blur(1px); animation: rise linear infinite; pointer-events: none;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.4; }
            100% { transform: translateY(-110vh) scale(0.5); opacity: 0; }
        }

        /* --- ÓRBITAS Y YIN-YANG --- */
        .logo-container { position: relative; width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; }
        .orbit { position: absolute; border-radius: 50%; border: 2px solid transparent; }
        .orbit-1 { inset: -10px; border-top: 3px solid var(--maidi-cyan); animation: spin 4s linear infinite; filter: drop-shadow(0 0 8px var(--maidi-cyan)); }
        .orbit-2 { inset: 5px; border-bottom: 3px solid var(--maidi-gold); animation: spin-rev 2.5s linear infinite; filter: drop-shadow(0 0 8px var(--maidi-gold)); }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes spin-rev { to { transform: rotate(-360deg); } }
        .yinyang-pulse { font-size: 4rem; animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* --- ESFERA DE QI (ESTILO ORIGINAL) --- */
        .qi-sphere {
            width: 45px; height: 45px; border-radius: 50%;
            background: radial-gradient(circle, var(--maidi-cyan) 20%, transparent 80%);
            box-shadow: 0 0 25px var(--maidi-cyan); animation: breathe 2s infinite;
        }
        @keyframes breathe { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }

        /* --- UI COMPONENTS --- */
        .screen { position: fixed; inset: 0; background: var(--bg-deep); z-index: 50; transition: 0.5s; display: flex; flex-direction: column; }
        .hidden-screen { opacity: 0; pointer-events: none; transform: scale(0.95); }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; transition: 0.3s; }
        
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        /* MANIQUÍ LOCALIZACIÓN */
        .mannequin-box { height: 400px; width: 100%; position: relative; border: 1px solid rgba(45, 212, 191, 0.2); border-radius: 30px; }
        .dot-target { position: absolute; width: 22px; height: 22px; background: #f43f5e; border-radius: 50%; box-shadow: 0 0 20px #f43f5e; cursor: pointer; z-index: 60; animation: ping 1.5s infinite; }
    </style>
</head>
<body class="max-w-md mx-auto h-screen relative bg-black">

    <div id="particle-field" class="fixed inset-0 pointer-events-none"></div>

    <!-- LOADER -->
    <div id="loader">
        <p id="wisdom-txt" class="ancient text-amber-500 text-xl px-12 italic mb-10"></p>
        <div class="qi-sphere"></div>
    </div>

    <!-- PANTALLA INICIO -->
    <div id="scr-start" class="screen items-center justify-center">
        <div class="logo-container mb-12">
            <div class="orbit orbit-1"></div>
            <div class="orbit orbit-2"></div>
            <i class="fas fa-yin-yang yinyang-pulse text-white"></i>
        </div>
        <h1 class="ancient text-4xl tracking-[10px] text-white">MTC MASTER</h1>
        <button onclick="nav('scr-pabellon')" class="mt-20 border-2 border-cyan-500 text-cyan-500 px-12 py-4 rounded-full font-bold uppercase tracking-[5px] hover:shadow-[0_0_20px_var(--maidi-cyan)] transition">Entrar</button>
    </div>

    <!-- PABELLÓN PRINCIPAL (CON LO SOCIAL Y COLECCIONABLE) -->
    <div id="scr-pabellon" class="screen hidden-screen p-8 pt-16">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="ancient text-3xl text-white">El Templo</h2>
                <p class="text-[9px] text-cyan-500 uppercase tracking-widest mt-1">Nivel: Iniciado de Jade</p>
            </div>
            <div class="qi-sphere"></div>
        </div>

        <div class="space-y-4 overflow-y-auto pb-10">
            <div onclick="nav('scr-camara')" class="glass p-6 flex items-center gap-5 border-l-4 border-purple-500">
                <i class="fas fa-fire-alt text-2xl text-purple-400"></i>
                <span class="text-xs font-bold uppercase tracking-widest">Cámara de Pruebas</span>
            </div>
            <div onclick="nav('scr-atlas')" class="glass p-6 flex items-center gap-5 border-l-4 border-emerald-500">
                <i class="fas fa-scroll text-2xl text-emerald-400"></i>
                <span class="text-xs font-bold uppercase tracking-widest">Atlas de Jade</span>
            </div>
            <!-- SECCIONES RECUPERADAS -->
            <div onclick="nav('scr-social')" class="glass p-6 flex items-center gap-5 border-l-4 border-indigo-500">
                <i class="fas fa-users text-2xl text-indigo-400"></i>
                <span class="text-xs font-bold uppercase tracking-widest">Senda del Maestro</span>
            </div>
            <div onclick="nav('scr-tesoros')" class="glass p-6 flex items-center gap-5 border-l-4 border-amber-500">
                <i class="fas fa-gem text-2xl text-amber-500"></i>
                <span class="text-xs font-bold uppercase tracking-widest">Tesoros Espirituales</span>
            </div>
        </div>
    </div>

    <!-- ATLAS (DINÁMICO) -->
    <div id="scr-atlas" class="screen hidden-screen p-8 pt-16">
        <button onclick="nav('scr-pabellon')" class="text-slate-500 text-[10px] mb-6 uppercase tracking-widest"><i class="fas fa-arrow-left"></i> Volver</button>
        <h2 class="ancient text-2xl text-white mb-6">Archivo de Puntos</h2>
        <div id="atlas-content" class="space-y-4 overflow-y-auto"></div>
    </div>

    <!-- LOCALIZACIÓN -->
    <div id="scr-loc" class="screen hidden-screen p-8 items-center">
        <h3 id="loc-instr" class="ancient text-xl text-white mb-8">Encuentra: IG4</h3>
        <div class="mannequin-box flex justify-center items-center">
            <img src="https://cdn-icons-png.flaticon.com/512/10344/10344318.png" class="opacity-20 h-full invert p-10" alt="human">
            <div id="target-point" class="dot-target" onclick="pointWon()"></div>
        </div>
        <button onclick="nav('scr-camara')" class="mt-10 text-slate-500 text-xs uppercase">Abandonar</button>
    </div>

    <!-- PLACEHOLDERS PARA SOCIAL Y TESOROS -->
    <div id="scr-social" class="screen hidden-screen p-8 pt-20">
        <button onclick="nav('scr-pabellon')" class="text-xs text-slate-500 mb-10">VOLVER</button>
        <h2 class="ancient text-2xl text-white">Ranking de Sabios</h2>
        <div class="mt-10 space-y-4">
            <div class="glass p-4 flex justify-between text-xs"><span>1. Gran Maestro Wu</span> <span class="text-cyan-400">99k QI</span></div>
            <div class="glass p-4 flex justify-between text-xs"><span>2. Tú (Iniciado)</span> <span class="text-cyan-400">1.5k QI</span></div>
        </div>
    </div>

    <div id="scr-tesoros" class="screen hidden-screen p-8 pt-20">
        <button onclick="nav('scr-pabellon')" class="text-xs text-slate-500 mb-10">VOLVER</button>
        <h2 class="ancient text-2xl text-white">Tus Reliquias</h2>
        <div class="grid grid-cols-3 gap-4 mt-10">
            <div class="glass h-20 flex items-center justify-center opacity-30"><i class="fas fa-lock"></i></div>
            <div class="glass h-20 flex items-center justify-center opacity-30"><i class="fas fa-lock"></i></div>
        </div>
    </div>

    <div id="scr-camara" class="screen hidden-screen p-8 pt-20">
        <button onclick="nav('scr-pabellon')" class="text-xs text-slate-500 mb-10">VOLVER</button>
        <div class="space-y-4">
            <div onclick="initLoc()" class="glass p-6 text-xs font-bold uppercase tracking-widest flex justify-between">Visión del Punto <i class="fas fa-crosshairs text-cyan-400"></i></div>
            <div class="glass p-6 text-xs font-bold uppercase tracking-widest flex justify-between opacity-50">Duelo de Pares (Próximamente) <i class="fas fa-clone text-purple-400"></i></div>
        </div>
    </div>

    <script>
        const DB = {
            wisdom: ["El Qi es la raíz del hombre.", "La calma es el maestro del movimiento.", "Donde hay Qi, hay vida."],
            points: [
                { id: "IG4", name: "Hegu", func: "Gran Eliminador", pos: { t: '38%', l: '32%' } },
                { id: "E36", name: "Zusanli", func: "Punto de Longevidad", pos: { t: '65%', l: '40%' } }
            ]
        };

        // MOTOR DE PARTÍCULAS (RESTAURADO)
        function initParticles() {
            const field = document.getElementById('particle-field');
            setInterval(() => {
                const p = document.createElement('div');
                p.className = 'knowledge-particle';
                const size = Math.random() * 5 + 2;
                p.style.width = p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 3 + 4) + 's';
                field.appendChild(p);
                setTimeout(() => p.remove(), 7000);
            }, 400);
        }
        initParticles();

        function nav(id) {
            const loader = document.getElementById('loader');
            const txt = document.getElementById('wisdom-txt');
            loader.style.display = 'flex';
            txt.innerText = `"${DB.wisdom[Math.floor(Math.random()*DB.wisdom.length)]}"`;
            
            setTimeout(() => {
                document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden-screen'));
                document.getElementById(id).classList.remove('hidden-screen');
                loader.style.display = 'none';
                if(id === 'scr-atlas') renderAtlas();
            }, 1200);
        }

        function renderAtlas() {
            const content = document.getElementById('atlas-content');
            content.innerHTML = DB.points.map(p => `
                <div class="glass p-6 border-l-2 border-emerald-500">
                    <h4 class="text-emerald-400 font-bold ancient text-xl">${p.id} - ${p.name}</h4>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-2">${p.func}</p>
                </div>
            `).join('');
        }

        function initLoc() {
            nav('scr-loc');
            const p = DB.points[Math.floor(Math.random()*DB.points.length)];
            document.getElementById('loc-instr').innerText = `Busca: ${p.id} (${p.name})`;
            const target = document.getElementById('target-point');
            target.style.top = p.pos.t;
            target.style.left = p.pos.l;
        }

        function pointWon() {
            alert("¡Punto Armonizado!");
            nav('scr-pabellon');
        }
    </script>
</body>
</html>
