<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maidi Master - Elite MTC</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --maidi-cyan: #2dd4bf;
            --maidi-gold: #fbbf24;
            --maidi-red: #f43f5e;
            --bg-deep: #020617;
        }

        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg-deep); color: #f1f5f9; margin: 0; overflow: hidden; }
        .ancient { font-family: 'Cinzel', serif; }

        /* --- LOGO ESFÉRICO 3D (RESTAURADO) --- */
        .spheric-container { position: relative; width: 140px; height: 140px; perspective: 1000px; margin: 0 auto; }
        .sphere-orbit {
            position: absolute; inset: 0; border: 1.5px solid var(--maidi-cyan); border-radius: 50%;
            opacity: 0.5; pointer-events: none;
        }
        .orbit-1 { animation: rotX 3s linear infinite; }
        .orbit-2 { animation: rotY 5s linear infinite; border-color: var(--maidi-gold); }
        
        @keyframes rotX { 0% { transform: rotateX(75deg) rotateZ(0deg); } 100% { transform: rotateX(75deg) rotateZ(360deg); } }
        @keyframes rotY { 0% { transform: rotateY(75deg) rotateZ(0deg); } 100% { transform: rotateY(75deg) rotateZ(-360deg); } }

        /* --- SISTEMA DE DOPAMINA: PARTICULAS --- */
        @keyframes success-pulse {
            0% { box-shadow: 0 0 0 0px rgba(45, 212, 191, 0.4); }
            100% { box-shadow: 0 0 0 50px rgba(45, 212, 191, 0); }
        }
        .win-flash { animation: success-pulse 0.6s ease-out; }

        /* --- RANKING ESTILO CIBERPUNK --- */
        .rank-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }
        .rank-item.user {
            border-color: var(--maidi-cyan);
            background: rgba(45, 212, 191, 0.1);
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.1);
        }

        /* --- ESTADO PÉRDIDA DE QI --- */
        .qi-warning {
            animation: flicker 2s infinite;
            color: var(--maidi-red);
            text-shadow: 0 0 10px var(--maidi-red);
        }
        @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .screen { position: fixed; inset: 0; background: var(--bg-deep); transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        .hidden-screen { opacity: 0; pointer-events: none; transform: scale(1.05); }

        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="max-w-md mx-auto h-screen relative border-x border-white/5 shadow-2xl">

    <!-- PANTALLA HUB (CENTRAL) -->
    <div id="scr-hub" class="screen p-6 pt-12 overflow-y-auto">
        <!-- Status Bar -->
        <div class="flex justify-between items-start mb-8">
            <div class="spheric-container !w-16 !h-16 !m-0">
                <div class="sphere-orbit orbit-1"></div>
                <div class="sphere-orbit orbit-2"></div>
                <div class="absolute inset-0 flex items-center justify-center text-xl">
                    <i class="fas fa-yin-yang text-cyan-400"></i>
                </div>
            </div>
            <div class="text-right">
                <p id="qi-status" class="text-[10px] font-bold tracking-widest uppercase qi-warning">Qi en Fuga (-10 XP/h)</p>
                <h2 class="ancient text-2xl text-white">Maestro <span class="text-cyan-400">You</span></h2>
                <p class="text-[10px] text-slate-500">Rango: Practicante de Jade</p>
            </div>
        </div>

        <!-- Secciones de Dopamina -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div onclick="showScreen('scr-rank')" class="glass p-4 rounded-2xl border-b-2 border-amber-500 active:scale-95 transition-transform">
                <i class="fas fa-chart-line text-amber-500 mb-2"></i>
                <p class="text-[10px] text-slate-400 uppercase">Ranking</p>
                <p class="text-lg font-bold">#14</p>
            </div>
            <div onclick="showScreen('scr-game')" class="glass p-4 rounded-2xl border-b-2 border-cyan-500 active:scale-95 transition-transform">
                <i class="fas fa-fire text-cyan-500 mb-2"></i>
                <p class="text-[10px] text-slate-400 uppercase">Duelo Diario</p>
                <p class="text-lg font-bold">+250 QI</p>
            </div>
        </div>

        <!-- Lista de Amigos / Chat Rápido -->
        <h3 class="ancient text-[10px] tracking-[4px] text-slate-500 mb-4 uppercase">Cámara de Ecos</h3>
        <div class="space-y-3 mb-8">
            <div class="flex items-center gap-4 glass p-3 rounded-xl">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-600 to-blue-400 flex items-center justify-center text-xs font-bold italic">Li</div>
                <div class="flex-1">
                    <p class="text-xs font-bold">Maestro Li</p>
                    <p class="text-[9px] text-emerald-500">Online • "Duelo?"</p>
                </div>
                <button class="px-3 py-1 bg-cyan-500/10 text-cyan-400 text-[9px] rounded-lg border border-cyan-500/20">RETAR</button>
            </div>
        </div>
    </div>

    <!-- PANTALLA RANKING GLOBAL -->
    <div id="scr-rank" class="screen hidden-screen p-6 pt-12 flex flex-col">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="showScreen('scr-hub')" class="text-slate-400"><i class="fas fa-arrow-left"></i></button>
            <h2 class="ancient text-xl tracking-widest">Altar de Maestros</h2>
        </div>

        <div id="rank-list" class="space-y-2 flex-1 overflow-y-auto pb-10">
            <!-- Inyectado por JS -->
        </div>
    </div>

    <!-- PANTALLA JUEGO (DOJO) -->
    <div id="scr-game" class="screen hidden-screen flex flex-col items-center justify-center p-8">
        <div id="game-container" class="w-full">
            <div class="text-center mb-10">
                <div id="timer-bar" class="w-full h-1 bg-white/10 rounded-full overflow-hidden mb-4">
                    <div id="timer-fill" class="h-full bg-cyan-500 w-full"></div>
                </div>
                <p class="text-[10px] text-cyan-500 uppercase tracking-widest">Estabiliza la energía</p>
            </div>
            
            <div id="q-card" class="glass p-8 rounded-3xl border-t-2 border-cyan-500 text-center mb-8">
                <h3 id="q-text" class="text-xl font-bold leading-relaxed italic">¿...?</h3>
            </div>

            <div id="q-options" class="grid gap-3"></div>
        </div>
    </div>

    <script>
        const state = {
            xp: 1250,
            streak: 0,
            rankData: [
                {n: "Zhen", xp: 4500, me: false},
                {n: "MTC_Shadow", xp: 3200, me: false},
                {n: "You (Maestro)", xp: 1250, me: true},
                {n: "Kenshin", xp: 900, me: false},
                {n: "Sofia_Qi", xp: 850, me: false}
            ],
            questions: [
                {q: "Lengua pálida, pulso débil y falta de aliento.", a: "Deficiencia de Qi", o: ["Deficiencia de Qi", "Estancamiento de Sangre", "Fuego de Hígado"]},
                {q: "Dolor punzante fijo y lengua violácea.", a: "Estasis de Sangre", o: ["Estasis de Sangre", "Viento-Frío", "Humedad-Calor"]}
            ]
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden-screen'));
            document.getElementById(id).classList.remove('hidden-screen');
            if(id === 'scr-rank') renderRank();
            if(id === 'scr-game') startGame();
        }

        function renderRank() {
            const list = document.getElementById('rank-list');
            list.innerHTML = state.rankData.map((user, i) => `
                <div class="rank-item ${user.me ? 'user' : ''} p-4 rounded-xl flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <span class="text-xs font-bold text-slate-500">#${i+1}</span>
                        <p class="text-sm font-bold ${user.me ? 'text-cyan-400' : ''}">${user.n}</p>
                    </div>
                    <p class="text-xs font-mono text-amber-500">${user.xp} QI</p>
                </div>
            `).join('');
        }

        function startGame() {
            const q = state.questions[Math.floor(Math.random()*state.questions.length)];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('q-options').innerHTML = q.o.sort(()=>Math.random()-0.5).map(opt => `
                <button onclick="checkAns('${opt}', '${q.a}', this)" class="glass p-4 rounded-xl text-sm font-bold hover:border-cyan-500 transition-all">
                    ${opt}
                </button>
            `).join('');
            
            // Animación de barra de tiempo
            const fill = document.getElementById('timer-fill');
            fill.style.transition = 'none';
            fill.style.width = '100%';
            setTimeout(() => {
                fill.style.transition = 'width 10s linear';
                fill.style.width = '0%';
            }, 50);
        }

        function checkAns(sel, corr, btn) {
            if(sel === corr) {
                btn.classList.add('bg-cyan-500/20', 'border-cyan-400');
                document.getElementById('q-card').classList.add('win-flash');
                setTimeout(() => {
                    document.getElementById('q-card').classList.remove('win-flash');
                    state.xp += 50;
                    state.streak++;
                    // Si acierta, la advertencia de "Qi en Fuga" desaparece
                    document.getElementById('qi-status').innerText = "Qi Estabilizado";
                    document.getElementById('qi-status').className = "text-[10px] font-bold tracking-widest uppercase text-emerald-500";
                    startGame();
                }, 600);
            } else {
                btn.classList.add('bg-rose-500/20', 'border-rose-500');
                setTimeout(startGame, 600);
            }
        }
    </script>
</body>
</html>
