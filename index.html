<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máster MTC - Maidi Project</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2dd4bf">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@400;600;700&display=swap');
        :root { --accent: #2dd4bf; --bg: #010409; --gold: #fbbf24; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: #e2e8f0; margin: 0; overflow: hidden; }
        .ancient { font-family: 'Cinzel', serif; }
        .screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-screen { opacity: 0; transform: scale(0.9) translateY(20px); pointer-events: none; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .btn-option { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .btn-option:active { transform: scale(0.95); background: rgba(45, 212, 191, 0.1); border-color: var(--accent); }
        #exam-timer-bar { height: 4px; background: var(--accent); width: 100%; transition: width 1s linear; }
        
        /* Animación de éxito */
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(251, 191, 36, 0); } 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } }
        .success-hit { animation: pulse-gold 0.5s ease-out; }
    </style>
</head>
<body class="max-w-md mx-auto h-screen relative shadow-2xl overflow-hidden">

    <div id="satori" class="fixed top-8 left-1/2 -translate-x-1/2 px-6 py-2 rounded-full glass text-[10px] font-bold z-[1000] opacity-0 transition-all pointer-events-none"></div>

    <div id="scr-splash" class="screen items-center justify-center p-8">
        <div class="mb-12 text-center">
            <i class="fas fa-yin-yang text-6xl text-cyan-400 animate-spin-slow mb-6"></i>
            <h1 class="ancient text-3xl tracking-[8px]">MÁSTER MTC</h1>
            <p class="text-[10px] tracking-[4px] text-amber-500 uppercase mt-2">Maidi Evolution</p>
        </div>
        <button onclick="initApp()" class="px-12 py-4 border border-cyan-500/30 rounded-full text-cyan-400 font-bold tracking-widest text-[10px] hover:bg-cyan-500/10">INICIAR CULTIVO</button>
    </div>

    <div id="scr-menu" class="screen hidden-screen p-8 pt-20">
        <div class="mb-10">
            <p id="txt-day" class="text-amber-500 text-[10px] font-bold uppercase tracking-widest mb-1"></p>
            <h2 class="ancient text-3xl">El Dojo</h2>
        </div>

        <div class="space-y-4">
            <button onclick="startMode('entrenar')" class="w-full glass p-6 flex items-center gap-6 text-left border-l-4 border-cyan-500">
                <i class="fas fa-leaf text-cyan-400 text-2xl"></i>
                <div><h4 class="font-bold text-white">Entrenamiento Diario</h4><p class="text-[9px] text-slate-500">Sin límite de tiempo • Gana QI</p></div>
            </button>
            
            <button onclick="startMode('examen')" class="w-full glass p-6 flex items-center gap-6 text-left border-l-4 border-amber-500">
                <i class="fas fa-scroll text-amber-500 text-2xl"></i>
                <div><h4 class="font-bold text-white">Modo Examen Imperial</h4><p class="text-[9px] text-slate-500">20 preguntas • 5 minutos • Rango Maestro</p></div>
            </button>
        </div>
    </div>

    <div id="scr-game" class="screen hidden-screen">
        <header class="p-6 flex justify-between items-center border-b border-white/5">
            <button onclick="exitGame()" class="text-slate-500"><i class="fas fa-chevron-left"></i></button>
            <div class="text-center">
                <p id="game-title" class="ancient text-[10px] text-amber-500 tracking-widest"></p>
                <p id="exam-stats" class="text-[10px] font-bold hidden">0 / 20</p>
            </div>
            <div class="w-8 h-8 rounded-full bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center text-[10px]" id="game-timer-txt">--</div>
        </header>
        
        <div id="exam-timer-bar" class="hidden"></div>

        <main class="flex-1 p-6 flex flex-col justify-center">
            <div id="q-container" class="glass p-8 mb-8 border-t-4 border-cyan-500 relative">
                <p id="q-category" class="text-[8px] font-bold text-cyan-400 uppercase tracking-widest mb-4"></p>
                <h3 id="q-text" class="text-lg font-bold leading-relaxed italic"></h3>
            </div>
            <div id="options-grid" class="grid gap-3"></div>
        </main>
    </div>

    <script>
        // --- MOTOR DE SONIDO (Web Audio API) ---
        const ZenAudio = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            playSuccess() {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, this.ctx.currentTime); // C5
                osc.frequency.exponentialRampToValueAtTime(1046.50, this.ctx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.5);
            },
            playFail() {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            }
        };

        // --- DATOS Y LÓGICA ---
        const DB = {
            "Lunes": { o: "Hígado", q: [
                {q: "¿Punto Shu-Dorsal del Hígado?", a: "V18 (Ganshu)", opts: ["V18","V19","V20","H14"]},
                {q: "La emoción que lesiona al Hígado es:", a: "La Ira", opts: ["La Ira","El Miedo","La Tristeza","La Preocupación"]}
            ]},
            "Martes": { o: "Corazón", q: [
                {q: "¿Cuál es el punto 'Shenmen'?", a: "C7", opts: ["C7","C3","PC6","ID3"]},
                {q: "El Corazón controla la lengua y:", a: "Los vasos sanguíneos", opts: ["Los vasos sanguíneos","Los tendones","Los huesos","La piel"]}
            ]},
            // ... (Resto de días expandibles igual)
            "General": [
                {q: "Punto de cruce de los 3 Yin del pie:", a: "BP6", opts: ["BP6","BP9","R3","H3"]},
                {q: "Punto Maestro de la cara:", a: "IG4", opts: ["IG4","E36","P7","VB20"]}
            ]
        };

        let state = {
            mode: '',
            score: 0,
            currentIdx: 0,
            timer: 0,
            timerInterval: null,
            totalExam: 20
        };

        function initApp() {
            const today = new Intl.DateTimeFormat('es-ES', { weekday: 'long' }).format(new Date());
            const capitalizedDay = today.charAt(0).toUpperCase() + today.slice(1);
            document.getElementById('txt-day').innerText = `DÍA DE ${capitalizedDay.toUpperCase()}`;
            showScreen('scr-menu');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden-screen'));
            document.getElementById(id).classList.remove('hidden-screen');
        }

        function startMode(m) {
            state.mode = m;
            state.score = 0;
            state.currentIdx = 0;
            showScreen('scr-game');
            
            if(m === 'examen') {
                state.timer = 300; // 5 minutos
                document.getElementById('exam-stats').classList.remove('hidden');
                document.getElementById('exam-timer-bar').classList.remove('hidden');
                document.getElementById('game-title').innerText = "EXAMEN IMPERIAL";
                startTimer();
            } else {
                document.getElementById('exam-stats').classList.add('hidden');
                document.getElementById('exam-timer-bar').classList.add('hidden');
                document.getElementById('game-title').innerText = "ENTRENAMIENTO";
                document.getElementById('game-timer-txt').innerText = "∞";
            }
            renderQuestion();
        }

        function startTimer() {
            clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                state.timer--;
                const mins = Math.floor(state.timer/60);
                const secs = state.timer % 60;
                document.getElementById('game-timer-txt').innerText = `${mins}:${secs < 10 ? '0'+secs : secs}`;
                document.getElementById('exam-timer-bar').style.width = (state.timer / 300 * 100) + "%";
                if(state.timer <= 0) finishExam();
            }, 1000);
        }

        function renderQuestion() {
            // Mezclamos preguntas del día y generales
            const today = new Intl.DateTimeFormat('es-ES', { weekday: 'long' }).format(new Date());
            const dayKey = today.charAt(0).toUpperCase() + today.slice(1);
            const pool = [...(DB[dayKey]?.q || []), ...DB.General];
            const q = pool[Math.floor(Math.random() * pool.length)];
            
            state.activeQ = q;
            document.getElementById('q-category').innerText = "Conocimiento Interno";
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('exam-stats').innerText = `${state.currentIdx + 1} / ${state.totalExam}`;

            const optsHtml = q.opts.sort(() => Math.random()-0.5).map(o => `
                <button onclick="checkAnswer('${o}')" class="btn-option glass p-5 text-sm font-bold text-slate-300 text-left">${o}</button>
            `).join('');
            document.getElementById('options-grid').innerHTML = optsHtml;
        }

        function checkAnswer(ans) {
            if(ans === state.activeQ.a) {
                state.score++;
                ZenAudio.playSuccess();
                flashSatori("¡Qi Correcto!", "var(--accent)");
            } else {
                ZenAudio.playFail();
                flashSatori("Desequilibrio", "#f87171");
            }
            
            state.currentIdx++;
            if(state.mode === 'examen' && state.currentIdx >= state.totalExam) {
                finishExam();
            } else {
                renderQuestion();
            }
        }

        function flashSatori(msg, color) {
            const s = document.getElementById('satori');
            s.innerText = msg;
            s.style.borderColor = color;
            s.style.opacity = "1";
            setTimeout(() => s.style.opacity = "0", 1000);
        }

        function finishExam() {
            clearInterval(state.timerInterval);
            const percent = (state.score / state.totalExam) * 100;
            alert(`Examen Finalizado.\nAciertos: ${state.score} / ${state.totalExam}\nCalificación: ${percent}%`);
            exitGame();
        }

        function exitGame() {
            clearInterval(state.timerInterval);
            showScreen('scr-menu');
        }

        function initWeekly() {
            // Lógica de notificaciones persistente (Android)
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js');
            }
        }
    </script>
</body>
</html>
