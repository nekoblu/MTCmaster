<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC Pro - Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .progress-transition { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .answer-card { transition: all 0.2s ease; }
        .answer-card:active { transform: scale(0.97); }
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animate-correct { animation: bounce-subtle 0.5s ease; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col shadow-2xl bg-white">

    <!-- TOP BAR: GAMIFICACIÓN -->
    <header class="p-4 bg-white border-b sticky top-0 z-20">
        <div class="flex justify-between items-center mb-3">
            <div>
                <span class="text-xs font-bold text-emerald-600 uppercase tracking-wider">Estudiante de MTC</span>
                <h1 class="text-xl font-bold flex items-center gap-2">
                    Nivel <span id="lvl-display" class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded">1</span>
                </h1>
            </div>
            <div class="flex gap-4">
                <div class="text-center">
                    <p class="text-[10px] text-gray-400 uppercase font-bold">Racha</p>
                    <p class="font-bold text-orange-500"><i class="fas fa-fire"></i> <span id="streak-display">0</span></p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] text-gray-400 uppercase font-bold">XP Total</p>
                    <p class="font-bold text-blue-500" id="xp-display">0</p>
                </div>
            </div>
        </div>
        <!-- BARRA DE PROGRESO DE NIVEL -->
        <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
            <div id="xp-bar" class="bg-emerald-500 h-full progress-transition" style="width: 0%"></div>
        </div>
    </header>

    <!-- ÁREA DE CONTENIDO DINÁMICO -->
    <main id="app-content" class="flex-1 p-5 overflow-y-auto pb-24">
        <!-- Se inyecta vía JavaScript -->
    </main>

    <!-- NAVEGACIÓN INFERIOR (Material Design) -->
    <nav class="fixed bottom-0 max-w-md w-full bg-white border-t flex justify-around py-3 px-2 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="changeTab('quiz')" class="nav-item flex flex-col items-center gap-1 text-emerald-600">
            <i class="fas fa-notes-medical text-lg"></i>
            <span class="text-[10px] font-bold">Diagnóstico</span>
        </button>
        <button onclick="changeTab('puntos')" class="nav-item flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-map-marker-alt text-lg"></i>
            <span class="text-[10px] font-bold">Puntos</span>
        </button>
        <button onclick="changeTab('atlas')" class="nav-item flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-book-open text-lg"></i>
            <span class="text-[10px] font-bold">Atlas</span>
        </button>
    </nav>

    <script>
        // --- BASE DE DATOS MEJORADA ---
        const DB = {
            patterns: {
                "bazo_qi_def": { nombre: "Deficiencia de Qi de Bazo", sintomas: ["Fatiga", "Heces blandas", "Falta de apetito"], color: "emerald" },
                "higado_qi_est": { nombre: "Estancamiento de Qi de Hígado", sintomas: ["Irritabilidad", "Opresión torácica", "Suspiros"], color: "emerald" },
                "riñon_yin_def": { nombre: "Deficiencia de Yin de Riñón", sintomas: ["Calor en 5 centros", "Sudor nocturno", "Lengua roja"], color: "emerald" }
            },
            questions: [
                { sintomas: ["Fatiga crónica", "Heces con tendencia a ser blandas"], correcta: "bazo_qi_def" },
                { sintomas: ["Sensación de nudo en la garganta", "Irasibilidad", "Distensión abdominal"], correcta: "higado_qi_est" },
                { sintomas: ["Insomnio", "Sudoración al dormir", "Palmas de manos calientes"], correcta: "riñon_yin_def" }
            ]
        };

        // --- ESTADO DE LA APLICACIÓN ---
        let state = {
            xp: 0,
            lvl: 1,
            streak: 0,
            currentIndex: 0,
            activeTab: 'quiz'
        };

        // --- LÓGICA DE ACTUALIZACIÓN ---
        function updateUI() {
            document.getElementById('xp-display').innerText = state.xp;
            document.getElementById('lvl-display').innerText = state.lvl;
            document.getElementById('streak-display').innerText = state.streak;
            
            // Lógica de nivel (cada 100 XP sube nivel)
            const progress = (state.xp % 100);
            document.getElementById('xp-bar').style.width = `${progress}%`;
            
            if (state.xp > 0 && state.xp % 100 === 0) {
                state.lvl++;
                showConfetti(); 
            }
        }

        function changeTab(tab) {
            state.activeTab = tab;
            // Actualizar colores nav
            document.querySelectorAll('.nav-item').forEach(el => el.classList.replace('text-emerald-600', 'text-gray-400'));
            event.currentTarget.classList.replace('text-gray-400', 'text-emerald-600');
            render();
        }

        function checkAnswer(key) {
            const correct = DB.questions[state.currentIndex].correcta;
            const btn = document.getElementById(`btn-${key}`);
            
            if (key === correct) {
                btn.classList.add('bg-emerald-500', 'text-white', 'border-emerald-600', 'animate-correct');
                state.xp += 20;
                state.streak++;
                setTimeout(() => nextQuestion(), 800);
            } else {
                btn.classList.add('bg-red-500', 'text-white', 'border-red-600');
                state.streak = 0;
                // Vibración visual simple
                btn.parentElement.classList.add('shake');
                setTimeout(() => render(), 800);
            }
            updateUI();
        }

        function nextQuestion() {
            state.currentIndex = (state.currentIndex + 1) % DB.questions.length;
            render();
        }

        // --- RENDERIZADO DE PANTALLAS ---
        function render() {
            const container = document.getElementById('app-content');
            
            if (state.activeTab === 'quiz') {
                const q = DB.questions[state.currentIndex];
                container.innerHTML = `
                    <div class="animate-in fade-in duration-500">
                        <div class="bg-emerald-50 p-6 rounded-3xl border border-emerald-100 mb-8 text-center">
                            <span class="text-emerald-600 font-bold text-xs tracking-widest uppercase">Caso Clínico</span>
                            <h2 class="text-xl font-bold mt-2 text-slate-800 leading-snug">
                                "${q.sintomas.join(" • ")}"
                            </h2>
                        </div>
                        <div class="space-y-3">
                            ${Object.keys(DB.patterns).map(key => `
                                <button id="btn-${key}" onclick="checkAnswer('${key}')" 
                                    class="answer-card w-full p-4 rounded-2xl border-2 border-gray-100 text-left font-semibold text-gray-700 hover:border-emerald-300 flex justify-between items-center shadow-sm">
                                    ${DB.patterns[key].nombre}
                                    <i class="fas fa-chevron-right text-gray-300"></i>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (state.activeTab === 'puntos') {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <i class="fas fa-lock text-4xl text-gray-200 mb-4"></i>
                        <h3 class="font-bold text-gray-400">Contenido Bloqueado</h3>
                        <p class="text-sm text-gray-400">Alcanza el Nivel 2 para practicar localización de puntos.</p>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="bg-slate-800 p-4 rounded-2xl text-white mb-4">
                        <h3 class="font-bold mb-2">Canal de Pulmón (Taiyin de la Mano)</h3>
                        <p class="text-xs opacity-70">11 puntos | Elemento Metal</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-xs">
                        <div class="p-3 border rounded-xl"><b>P7 (Lieque):</b> Punto Luo, apertura de Ren Mai.</div>
                        <div class="p-3 border rounded-xl"><b>P11 (Shaoshang):</b> Punto Jing-Pozo, calor en garganta.</div>
                    </div>
                `;
            }
        }

        // Inicialización
        render();
        updateUI();

        function showConfetti() {
            // Placeholder para una función de celebración
            console.log("¡Subiste de nivel!");
        }
    </script>
</body>
</html>
