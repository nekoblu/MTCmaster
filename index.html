<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máster MTC - Maidi Aura Eterna</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#030712">
    <link rel="icon" type="image/png" href="icon-512.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Space+Grotesk:wght@400;600;700&display=swap');
        
        :root {
            --maidi-cyan: #2dd4bf;
            --maidi-gold: #fbbf24;
            --bg-dark: #030712;
            --card-dark: rgba(17, 24, 39, 0.7);
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: var(--bg-dark); 
            color: #e2e8f0; 
            margin: 0; 
            overflow: hidden;
            user-select: none;
        }
        
        .ancient { font-family: 'Cinzel', serif; }

        /* Capas de Pantalla */
        .screen { 
            position: fixed; inset: 0; width: 100%; height: 100%; 
            background: var(--bg-dark); z-index: 100; 
            display: flex; flex-direction: column; 
            transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1); 
        }
        .hidden-screen { transform: translateY(100%); opacity: 0; pointer-events: none; visibility: hidden; }

        /* 1. Recuperado: Patrón de cuadrícula sutil en el fondo */
        .grid-bg {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(45, 212, 191, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(45, 212, 191, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.2; z-index: 1;
        }

        /* 2. Recuperado: Logo M con borde cian eléctrico y resplandor */
        .logo-m-aura {
            position: relative; width: 120px; height: 120px;
            background: rgba(3, 7, 18, 0.8);
            border: 2px solid var(--maidi-cyan);
            border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem; font-weight: 800; color: white;
            box-shadow: 0 0 30px rgba(45, 212, 191, 0.3), inset 0 0 15px rgba(45, 212, 191, 0.2);
            z-index: 10;
        }
        .logo-shadow {
            position: absolute; inset: -20px;
            background: var(--maidi-cyan);
            blur: 80px; filter: blur(60px); opacity: 0.15; z-index: 5;
            border-radius: 50%;
        }

        /* 3. Recuperado: UI de Cristal Oscuro (Glassmorphism) */
        .glass-aura {
            background: var(--card-dark);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 28px;
            transition: all 0.3s ease;
        }
        /* 4. Recuperado: Reacción con destello cian (hover/active) */
        .glass-aura:active, .glass-aura.active-path {
            border-color: rgba(45, 212, 191, 0.6);
            box-shadow: 0 0 25px rgba(45, 212, 191, 0.15);
            background: rgba(45, 212, 191, 0.05);
        }

        /* 5. Recuperado: Aura detrás de los textos de Quiz */
        .text-aura {
            position: relative; z-index: 10;
        }
        .text-aura::after {
            content: ''; position: absolute; inset: -10px;
            background: var(--maidi-cyan); filter: blur(25px);
            opacity: 0.1; z-index: -1; border-radius: 50%;
        }

        /* 6. Recuperado: Skill-Orbs resplandecientes */
        .skill-orb {
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(251, 191, 36, 0.03);
            border: 2px dashed rgba(251, 191, 36, 0.2);
            display: flex; align-items: center; justify-content: center;
            color: rgba(251, 191, 36, 0.3); transition: all 1s ease;
        }
        .skill-unlocked {
            background: rgba(251, 191, 36, 0.1);
            border: 2px solid var(--maidi-gold);
            color: var(--maidi-gold);
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.3), inset 0 0 10px rgba(251, 191, 36, 0.2);
        }

        /* 7. Notificaciones Satori Premium (Integrada con destello) */
        #satori {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%) translateY(-20px);
            padding: 12px 30px; border-radius: 50px; font-weight: bold; font-size: 0.75rem;
            opacity: 0; transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 1000; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); white-space: nowrap;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #satori.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* UI Dinámica */
        .tab-content { display: none; height: calc(100vh - 170px); overflow-y: auto; padding: 20px; }
        .active-tab { display: block; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Barra de Tiempo Duelo Noche */
        #duel-timer { height: 4px; background: var(--maidi-cyan); transition: width linear; width: 100%; }

    </style>
</head>
<body class="max-w-md mx-auto h-screen relative border-x border-white/5 shadow-2xl overflow-hidden">

    <div id="satori"></div>

    <div id="scr-splash" class="screen items-center justify-center p-8">
        <div class="grid-bg"></div>
        <div class="logo-shadow"></div>
        
        <div class="logo-m-aura mb-10">M</div>
        
        <h1 class="ancient text-3xl font-bold tracking-[8px] text-white z-10">MÁSTER MTC</h1>
        <div class="h-[1px] w-24 bg-gradient-to-r from-transparent via-cyan-500 to-transparent my-4 z-10"></div>
        <p class="ancient text-[10px] text-amber-400 tracking-[5px] uppercase z-10">Maidi Project • Wisdom Path</p>
        
        <button onclick="toSelector()" class="mt-28 px-14 py-4 bg-transparent border-2 border-cyan-500/30 rounded-full text-cyan-400 font-bold tracking-widest text-[10px] hover:border-cyan-400 hover:bg-cyan-500/10 transition-all z-10 shadow-[0_0_20px_rgba(45,212,191,0.2)]">SINTONIZAR QI</button>
    </div>

    <div id="scr-selector" class="screen hidden-screen p-8 pt-24 bg-[#010203]">
        <div class="flex justify-between items-center mb-10">
            <div>
                <p class="ancient text-amber-500 text-[10px] tracking-widest mb-1 flex items-center gap-2">
                    <span class="w-10 h-[1px] bg-amber-500"></span> SELECTOR DE PLANO
                </p>
                <h2 class="ancient text-4xl text-white">El Camino.</h2>
            </div>
            <div class="w-14 h-14 rounded-full bg-cyan-900/50 border-2 border-cyan-500 flex items-center justify-center text-cyan-400 text-xs font-bold shadow-[0_0_15px_rgba(45,212,191,0.3)]">
                <span id="streak-counter">1D</span>
            </div>
        </div>

        <div class="space-y-4">
            <button onclick="launchApp('quiz')" class="w-full glass-aura p-6 flex items-center gap-6 text-left border-l-4 border-cyan-500 hover:scale-[1.02]">
                <i class="fas fa-scroll text-cyan-400 text-2xl"></i>
                <div><h4 class="font-bold text-white text-sm">Dojo de Casos</h4><p class="text-[9px] text-slate-500">Multivisión clínica</p></div>
            </button>
            <button id="lock-pulso" onclick="launchApp('pulso')" class="w-full glass-aura p-6 flex items-center gap-6 text-left opacity-30">
                <i id="pulso-icon" class="fas fa-lock text-slate-600 text-2xl"></i>
                <div><h4 class="font-bold text-slate-500">Alquimia de Pulso</h4><p class="text-[9px] text-slate-600">Nivel 2 necesario</p></div>
            </button>
        </div>
    </div>

    <div id="app-main" class="flex flex-col h-full relative">
        <header class="p-6 glass-aura rounded-none border-x-0 border-t-0 flex justify-between items-center z-50">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-cyan-500/5 border border-cyan-500/20 flex items-center justify-center text-xl text-cyan-400 shadow-[0_0_10px_rgba(45,212,191,0.2)]">
                    <i id="lvl-icon" class="fas fa-seedling"></i>
                </div>
                <div>
                    <h1 class="ancient text-[9px] tracking-widest text-amber-500">MÁSTER MTC</h1>
                    <p id="lvl-name" class="text-[9px] font-bold text-white uppercase opacity-70">Semilla</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-xl font-bold text-white tracking-tighter" id="xp-val">0 <span class="text-[10px] text-cyan-400 font-normal">QI</span></p>
                <div class="w-20 h-1 bg-white/5 rounded-full mt-1 overflow-hidden">
                    <div id="xp-bar" class="h-full bg-cyan-500 transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-hidden relative">
            <div id="tab-quiz" class="tab-content active-tab">
                <div class="glass-aura p-8 mb-6 border-t-2 border-cyan-500 overflow-hidden relative">
                    <div class="text-aura absolute inset-0 opacity-10"></div>
                    <p id="q-cat" class="relative text-[10px] font-bold text-cyan-400 uppercase tracking-[4px] mb-4 italic">Zang-Fu</p>
                    <h2 id="q-text" class="relative text-lg font-bold leading-relaxed text-slate-200">...</h2>
                </div>
                <div id="q-options" class="grid gap-3"></div>
            </div>

            <div id="tab-pulso" class="tab-content">
                <h2 class="ancient text-2xl text-white mb-6">Alquimia del Pulso</h2>
                <div id="pulso-grid" class="grid grid-cols-2 gap-4"></div>
            </div>

            <div id="tab-atlas" class="tab-content">
                <h2 class="ancient text-2xl text-white mb-6">Atlas de Sabiduría</h2>
                <div id="atlas-list" class="space-y-4 pb-12"></div>
            </div>

            <div id="tab-skills" class="tab-content">
                <h2 class="ancient text-2xl text-white mb-6 text-center">Tus Reliquias</h2>
                <div id="skills-grid" class="grid grid-cols-3 gap-6 pt-10">
                    <div class="flex flex-col items-center gap-3">
                        <div class="skill-orb skill-unlocked"><i class="fas fa-eye"></i></div>
                        <p class="text-[9px] font-bold text-amber-500 text-center uppercase">Ojo de Lince</p>
                    </div>
                    <div class="flex flex-col items-center gap-3">
                        <div class="skill-orb"><i class="fas fa-wave-square"></i></div>
                        <p class="text-[9px] font-bold text-slate-600 text-center uppercase">Pulso Maestro</p>
                    </div>
                    <div class="flex flex-col items-center gap-3">
                        <div class="skill-orb"><i class="fas fa-feather"></i></div>
                        <p class="text-[9px] font-bold text-slate-600 text-center uppercase">Puntura Maidi</p>
                    </div>
                </div>
            </div>
        </main>

        <nav class="p-4 glass-aura bg-black/95 border-t border-white/5 flex justify-around items-center rounded-none shadow-[0_-10px_30px_rgba(0,0,0,0.5)] z-40">
            <button onclick="switchTab('quiz')" class="p-3 text-cyan-400 transition-transform active:scale-90"><i class="fas fa-dharmachakra text-xl"></i></button>
            <button onclick="switchTab('pulso')" class="p-3 text-slate-600 transition-transform active:scale-90"><i class="fas fa-wave-square text-xl"></i></button>
            <button onclick="switchTab('atlas')" class="p-3 text-slate-600 transition-transform active:scale-90"><i class="fas fa-book-open text-xl"></i></button>
            <button onclick="switchTab('skills')" class="p-3 text-slate-600 transition-transform active:scale-90"><i class="fas fa-gem text-xl"></i></button>
        </nav>
    </div>

    <script>
        // --- BASE DE DATOS Y LÓGICA (Mantenida) ---
        const DB = {
            syndromes: [
                { n: "Def. Qi de Pulmón", s: "Disnea, voz débil, sudoración diurna, cansancio suave", p: "P7, P9, V13" },
                { n: "Fuego de Hígado", s: "Ojos rojos, sabor amargo, cefalea temporal, ira súbita", p: "H2, H3, VB20" },
                { n: "Humedad en Bazo", s: "Heces pastosas, pesadez, náuseas, lengua saburral grasa", p: "BP9, BP6, V20" },
                { n: "Def. Yin de Riñón", s: "Calor nocturno, boca seca, dolor lumbar, sudoración al dormir", p: "R3, R6, V23" }
            ],
            levels: [
                { lvl: 1, n: "Semilla", i: "fa-seedling", color: "text-cyan-400" },
                { lvl: 2, n: "Brote", i: "fa-leaf", color: "text-emerald-400" },
                { lvl: 3, n: "Flor de Loto", i: "fa-spa", color: "text-rose-400" }
            ]
        };

        let state = { xp: 0, lvl: 1, idx: 0 };

        // Recuperado: Notificación Satori Premium
        function showSatori(m, t = 'success') {
            const s = document.getElementById('satori');
            s.innerText = m;
            s.style.color = t === 'success' ? 'var(--maidi-cyan)' : 'var(--error)';
            s.className = 'show';
            setTimeout(() => s.className = '', 2500);
        }

        function toSelector() { 
            document.getElementById('scr-splash').classList.add('hidden-screen'); 
            document.getElementById('scr-selector').classList.remove('hidden-screen'); 
        }

        function launchApp(tab) {
            if(tab === 'pulso' && state.lvl < 2) return showSatori("Qi insuficiente para Alquimia", "error");
            document.getElementById('scr-selector').classList.add('hidden-screen');
            switchTab(tab);
            renderQuiz();
            renderAtlas();
            renderPulso();
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.getElementById('tab-' + t).classList.add('active-tab');
            document.querySelectorAll('nav button').forEach((btn, i) => {
                const active = (i===0 && t==='quiz') || (i===1 && t==='pulso') || (i===2 && t==='atlas') || (i===3 && t==='skills');
                btn.className = active ? 'p-3 text-cyan-400 transition-transform active:scale-90' : 'p-3 text-slate-600 transition-transform active:scale-90';
            });
        }

        function renderQuiz() {
            const q = DB.syndromes[state.idx];
            document.getElementById('q-text').innerText = `"${q.s}"`;
            document.getElementById('q-cat').innerText = `DIAGNÓSTICO ZANG-FU`;
            
            const options = DB.syndromes.map(item => item.n).sort(() => Math.random() - 0.5);
            document.getElementById('q-options').innerHTML = options.map(ans => `
                <button onclick="check('${ans}')" class="glass-aura p-5 rounded-2xl text-left font-bold text-slate-300 text-sm hover:scale-[1.02]">
                    ${ans}
                </button>
            `).join('');
        }

        function check(ans) {
            if(ans === DB.syndromes[state.idx].n) {
                state.xp += 50;
                state.idx = (state.idx + 1) % DB.syndromes.length;
                showSatori("¡Qi en ascenso!");
                updateStats();
                renderQuiz();
            } else { 
                showSatori("Energía dispersada. Intenta de nuevo.", "error");
            }
        }

        function updateStats() {
            document.getElementById('xp-val').innerHTML = `${state.xp} <span class="text-[10px] text-cyan-400 font-normal">QI</span>`;
            document.getElementById('xp-bar').style.width = (state.xp % 100) + "%";
            
            let nL = Math.floor(state.xp / 100) + 1;
            if(nL > state.lvl && nL <= 3) {
                state.lvl = nL;
                const info = DB.levels[state.lvl - 1];
                document.getElementById('lvl-icon').className = `fas ${info.i} ${info.color}`;
                document.getElementById('lvl-name').innerText = `Grado ${state.lvl}: ${info.n}`;
                
                if(state.lvl >= 2) {
                    document.getElementById('lock-pulso').classList.remove('opacity-30');
                    document.getElementById('pulso-icon').className = "fas fa-wave-square text-cyan-400 text-2xl";
                }
                showSatori(`¡ASCENSIÓN! Rango: ${info.n}`);
            }
        }

        function renderAtlas() {
            document.getElementById('atlas-list').innerHTML = DB.syndromes.map(s => `
                <div class="glass-aura p-5 border-l-4 border-cyan-700">
                    <h4 class="text-cyan-400 font-bold mb-2">${s.n}</h4>
                    <p class="text-[10px] text-slate-400 mb-2">${s.s}</p>
                    <div class="text-[10px] font-bold text-amber-500 uppercase tracking-widest">Acupuntura: ${s.p}</div>
                </div>
            `).join('');
        }

        function renderPulso() {
            const pulsos = [
                {n: "Cuerda (Xian)", d: "Tensión, como cuerda de cítara. Hígado.", i: "fa-wave-square"},
                {n: "Vacío (Xu)", d: "Sin fuerza bajo presión. Deficiencia de Qi.", i: "fa-ghost"}
            ];
            document.getElementById('pulso-grid').innerHTML = pulsos.map(p => `
                <div class="glass-aura p-5 text-center flex flex-col items-center gap-2">
                    <i class="fas ${p.i} text-cyan-500 text-2xl"></i>
                    <h5 class="text-[10px] font-bold text-white uppercase">${p.n}</h5>
                    <p class="text-[8px] text-slate-500 italic">${p.d}</p>
                </div>
            `).join('');
        }

        renderQuiz();
    </script>
</body>
</html>
