<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC Master | MAIDI Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --maidi-cyan: #2dd4bf;
            --maidi-gold: #fbbf24;
            --maidi-purple: #a855f7;
            --maidi-red: #f43f5e;
            --maidi-green: #10b981;
            --bg-deep: #020617;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: var(--bg-deep); color: #f1f5f9; margin: 0; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            height: 100vh;
        }
        .ancient { font-family: 'Cinzel', serif; }

        /* --- CAPA DE PARTÍCULAS (FONDO) --- */
        #particles-bg { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .qi-particle { position: absolute; border-radius: 50%; background: var(--maidi-cyan); opacity: 0.1; animation: float 15s infinite linear; }
        @keyframes float { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }

        /* --- ÓRBITAS (REFORZADAS Y ANCLADAS) --- */
        .logo-wrapper { position: relative; width: 180px; height: 180px; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .orbit { position: absolute; border-radius: 50%; border: 2px solid transparent; }
        .orbit-outer { width: 100%; height: 100%; border-top: 3px solid var(--maidi-cyan); animation: rotate-cw 4s linear infinite; filter: drop-shadow(0 0 8px var(--maidi-cyan)); }
        .orbit-inner { width: 70%; height: 70%; border-bottom: 3px solid var(--maidi-gold); animation: rotate-ccw 3s linear infinite; filter: drop-shadow(0 0 8px var(--maidi-gold)); }
        @keyframes rotate-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        /* --- UI GLASS --- */
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; transition: 0.3s; }
        .glass:active { transform: scale(0.98); border-color: var(--maidi-cyan); }

        /* --- PANTALLAS --- */
        .screen { position: absolute; inset: 0; padding: 2rem; display: flex; flex-direction: column; z-index: 20; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); background: transparent; }
        .hidden-screen { opacity: 0; pointer-events: none; transform: translateY(20px); }

        /* --- JUEGO PARES --- */
        .pair-card { padding: 10px; font-size: 10px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .selected { border-color: var(--maidi-gold); background: rgba(251, 191, 36, 0.1); }
        .matched { opacity: 0.3; pointer-events: none; border-color: var(--maidi-green); }

        /* --- JUEGO LOCALIZACIÓN --- */
        .body-silhouette { width: 160px; height: 300px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 80px; margin: 0 auto; position: relative; }
        .point-marker { position: absolute; width: 16px; height: 16px; background: var(--maidi-red); border-radius: 50%; transform: translate(-50%, -50%); cursor: pointer; box-shadow: 0 0 15px var(--maidi-red); }
    </style>
</head>
<body class="max-w-md mx-auto">

    <div id="particles-bg"></div>

    <!-- PANTALLA INICIO -->
    <div id="scr-start" class="screen items-center justify-center">
        <div class="logo-wrapper mb-12">
            <div class="orbit orbit-outer"></div>
            <div class="orbit orbit-inner"></div>
            <i class="fas fa-yin-yang text-5xl text-white"></i>
        </div>
        <h1 class="ancient text-4xl tracking-[10px] text-white text-center">MTC MASTER</h1>
        <p class="text-[10px] text-cyan-400 tracking-[4px] mt-2 mb-16 uppercase">Digital Cultivation</p>
        <button onclick="showScreen('scr-pabellon')" class="bg-cyan-500 text-slate-900 font-bold px-12 py-4 rounded-full text-xs tracking-widest hover:shadow-[0_0_20px_var(--maidi-cyan)] transition-all">INICIAR VIAJE</button>
    </div>

    <!-- PABELLÓN PRINCIPAL -->
    <div id="scr-pabellon" class="screen hidden-screen pt-12 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="ancient text-2xl text-white">El Templo</h2>
            <div class="glass px-4 py-1 rounded-full"><span class="text-[10px] text-amber-500 font-bold">1250 QI</span></div>
        </div>

        <div class="grid grid-cols-1 gap-4 mb-8">
            <div onclick="showScreen('scr-games')" class="glass p-6 flex items-center gap-6 border-l-4 border-purple-500">
                <i class="fas fa-gamepad text-2xl text-purple-400"></i>
                <div>
                    <h4 class="text-xs font-bold text-white uppercase">Cámara de Pruebas</h4>
                    <p class="text-[9px] text-slate-400 uppercase tracking-tighter">Entrena tus habilidades</p>
                </div>
            </div>
            <div onclick="showScreen('scr-social')" class="glass p-6 flex items-center gap-6 border-l-4 border-indigo-500">
                <i class="fas fa-users text-2xl text-indigo-400"></i>
                <div>
                    <h4 class="text-xs font-bold text-white uppercase">Hermandad</h4>
                    <p class="text-[9px] text-slate-400 uppercase tracking-tighter">Ranking y Duelos Social</p>
                </div>
            </div>
        </div>

        <div class="glass p-5 border-l-4 border-emerald-500 mb-20" onclick="showScreen('scr-atlas')">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-bold text-emerald-400 uppercase">Biblioteca Sagrada</span>
                <i class="fas fa-scroll text-emerald-500"></i>
            </div>
        </div>
    </div>

    <!-- SELECTOR DE JUEGOS -->
    <div id="scr-games" class="screen hidden-screen pt-12">
        <button onclick="showScreen('scr-pabellon')" class="text-slate-500 text-[10px] font-bold mb-8"><i class="fas fa-arrow-left mr-2"></i> VOLVER</button>
        <h3 class="ancient text-xl text-white mb-8">Cámara de Pruebas</h3>
        
        <div class="space-y-4">
            <div onclick="initPairs()" class="glass p-5 flex justify-between items-center">
                <span class="text-xs font-bold uppercase">Enlace de Energías</span>
                <i class="fas fa-link text-purple-400"></i>
            </div>
            <div onclick="initLoc()" class="glass p-5 flex justify-between items-center">
                <span class="text-xs font-bold uppercase">Visión Interior (GPS)</span>
                <i class="fas fa-crosshairs text-rose-400"></i>
            </div>
        </div>
    </div>

    <!-- JUEGO PARES -->
    <div id="scr-game-pairs" class="screen hidden-screen pt-12">
        <button onclick="showScreen('scr-games')" class="text-slate-500 text-[10px] font-bold mb-6 uppercase">Abandonar</button>
        <div id="pairs-container" class="grid grid-cols-2 gap-3"></div>
        <p id="pairs-msg" class="text-center mt-8 text-[10px] font-bold text-cyan-400"></p>
    </div>

    <!-- JUEGO LOCALIZACIÓN -->
    <div id="scr-game-loc" class="screen hidden-screen pt-12">
        <button onclick="showScreen('scr-games')" class="text-slate-500 text-[10px] font-bold mb-6 uppercase">Abandonar</button>
        <h4 id="loc-title" class="text-center text-sm font-bold text-white mb-8">LOCALIZA EL PUNTO</h4>
        <div class="body-silhouette">
            <div id="loc-point" class="point-marker" style="display:none" onclick="hitLoc()"></div>
        </div>
        <p id="loc-feedback" class="text-center mt-8 text-[10px] font-bold text-rose-400 uppercase"></p>
    </div>

    <!-- SOCIAL / RANKING -->
    <div id="scr-social" class="screen hidden-screen pt-12">
        <button onclick="showScreen('scr-pabellon')" class="text-slate-500 text-[10px] font-bold mb-8 uppercase"><i class="fas fa-arrow-left mr-2"></i> VOLVER</button>
        <h3 class="ancient text-xl text-white mb-6">Hermandad</h3>
        <div class="space-y-3">
            <div class="glass p-4 flex justify-between items-center">
                <span class="text-[10px] font-bold text-amber-500">#1 Maestro_Zhong</span>
                <span class="text-[10px] text-white">9,800 QI</span>
            </div>
            <div class="glass p-4 flex justify-between items-center border-cyan-500/50">
                <span class="text-[10px] font-bold text-cyan-400">#12 Tú (Invitado)</span>
                <span class="text-[10px] text-white">1,250 QI</span>
            </div>
        </div>
    </div>

    <script>
        // --- NAVEGACIÓN ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden-screen'));
            document.getElementById(id).classList.remove('hidden-screen');
        }

        // --- LÓGICA JUEGO PARES ---
        const pairsData = [
            { id: 1, p: "IG4", f: "Cara/Boca" },
            { id: 2, p: "E36", f: "Energía Vital" },
            { id: 3, p: "PC6", f: "Ansiedad" },
            { id: 4, p: "H3", f: "Hígado/Ira" }
        ];
        let pSelected = null, fSelected = null;

        function initPairs() {
            showScreen('scr-game-pairs');
            const container = document.getElementById('pairs-container');
            container.innerHTML = '';
            document.getElementById('pairs-msg').innerText = "CONECTA LOS MERIDIANOS";
            
            const points = [...pairsData].sort(() => Math.random() - 0.5);
            const funcs = [...pairsData].sort(() => Math.random() - 0.5);

            points.forEach(d => {
                const div = document.createElement('div');
                div.className = 'glass pair-card';
                div.innerText = d.p;
                div.onclick = () => {
                    document.querySelectorAll('.pair-card').forEach(c => c.classList.remove('selected'));
                    div.classList.add('selected');
                    pSelected = d;
                    checkPair();
                };
                container.appendChild(div);
            });
            funcs.forEach(d => {
                const div = document.createElement('div');
                div.className = 'glass pair-card';
                div.innerText = d.f;
                div.onclick = () => {
                    fSelected = d;
                    div.classList.add('selected');
                    checkPair();
                };
                container.appendChild(div);
            });
        }

        function checkPair() {
            if(pSelected && fSelected) {
                if(pSelected.id === fSelected.id) {
                    document.querySelectorAll('.selected').forEach(el => el.classList.add('matched'));
                    pSelected = null; fSelected = null;
                } else {
                    setTimeout(() => {
                        document.querySelectorAll('.pair-card').forEach(el => el.classList.remove('selected'));
                        pSelected = null; fSelected = null;
                    }, 300);
                }
            }
        }

        // --- LÓGICA JUEGO LOCALIZACIÓN ---
        const locPoints = [
            { n: "IG4 (Hegu)", t: "40%", l: "20%" },
            { n: "V1 (Jingming)", t: "15%", l: "48%" },
            { n: "R3 (Taixi)", t: "85%", l: "35%" }
        ];
        let currentLoc = 0;

        function initLoc() {
            showScreen('scr-game-loc');
            nextLoc();
        }

        function nextLoc() {
            const p = locPoints[currentLoc];
            document.getElementById('loc-title').innerText = `TOCA: ${p.n}`;
            const target = document.getElementById('loc-point');
            target.style.top = p.t;
            target.style.left = p.l;
            target.style.display = 'block';
            target.style.opacity = '0'; // Secreto al inicio
        }

        function hitLoc() {
            document.getElementById('loc-point').style.opacity = '1';
            document.getElementById('loc-feedback').innerText = "¡PUNTO ACTIVADO! +50 QI";
            setTimeout(() => {
                currentLoc = (currentLoc + 1) % locPoints.length;
                document.getElementById('loc-feedback').innerText = "";
                nextLoc();
            }, 1200);
        }

        // --- PARTÍCULAS ---
        const pContainer = document.getElementById('particles-bg');
        for(let i=0; i<15; i++) {
            const p = document.createElement('div');
            p.className = 'qi-particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.width = p.style.height = (Math.random() * 8 + 2) + 'px';
            p.style.animationDelay = Math.random() * 5 + 's';
            pContainer.appendChild(p);
        }
    </script>
</body>
</html>
