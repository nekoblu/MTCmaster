<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máster MTC - Aura Zen Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f1f5f9">
    <link rel="icon" type="image/png" href="icon-512.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap');
        
        :root { --accent: #14b8a6; --bg-clean: #f1f5f9; --text-main: #0f172a; --gold: #f59e0b; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg-clean); color: var(--text-main); margin: 0; overflow: hidden; }
        .ancient { font-family: 'Cinzel', serif; }

        /* Estructura de Pantallas Premium */
        .screen { position: fixed; inset: 0; background: var(--bg-clean); z-index: 100; display: flex; flex-direction: column; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .hidden-screen { opacity: 0; transform: scale(1.05) translateY(20px); pointer-events: none; }

        /* UI Elementos Clean */
        .card-wisdom { background: #ffffff; border-radius: 30px; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 10px 40px rgba(0,0,0,0.04); }
        .btn-option { background: #f8fafc; border-radius: 20px; border: 1px solid rgba(0,0,0,0.05); transition: 0.2s; color: var(--text-main); font-weight: 600; text-align: left; }
        .btn-option:active { transform: scale(0.97); background: #f0fdfa; border-color: var(--accent); }

        /* LOGO DINÁMICO (Recuperado) */
        .maidi-logo-container { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
        .logo-ring { position: absolute; inset: 0; border: 2px solid #e2e8f0; border-radius: 50%; }
        .logo-orbit { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid transparent; border-top-color: var(--accent); animation: orbit 4s linear infinite; }
        .logo-orbit.fast { border-top-color: var(--gold); animation: orbit 2.5s linear infinite reverse; width: 85%; height: 85%; }
        @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Notificación Satori Premium */
        #satori { position: fixed; top: 25px; left: 50%; transform: translateX(-50%) translateY(-20px); padding: 12px 30px; border-radius: 50px; font-weight: bold; font-size: 0.75rem; opacity: 0; transition: 0.4s; z-index: 1000; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); color: white; white-space: nowrap; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        #satori.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    
        /* Barra de Tiempo Examen */
        #exam-timer-bar { height: 4px; background: var(--accent); width: 100%; transition: width 1s linear; }
    </style>
</head>
<body class="max-w-md mx-auto h-screen relative shadow-2xl overflow-hidden border-x border-slate-100">

    <div id="satori"></div>

    <div id="scr-splash" class="screen items-center justify-center p-8 bg-slate-50">
        <div class="maidi-logo-container mb-12">
            <div class="logo-ring"></div>
            <div class="logo-orbit"></div>
            <div class="logo-orbit fast"></div>
            <i class="fas fa-yin-yang text-4xl text-slate-900 z-10"></i>
        </div>
        <h1 class="text-4xl font-extrabold tracking-tighter text-slate-950 mb-1">MAIDI</h1>
        <p class="ancient text-[10px] text-teal-600 tracking-[5px] uppercase opacity-70 mb-28">Máster MTC</p>
        
        <button onclick="initApp()" class="px-12 py-4 bg-teal-600 rounded-full text-white font-bold tracking-widest text-xs hover:bg-teal-700 shadow-lg shadow-teal-500/30 transition-all active:scale-95">INICIAR CULTIVO</button>
    </div>

    <div id="scr-menu" class="screen hidden-screen p-8 pt-20">
        <div class="flex justify-between items-center mb-12">
            <div>
                <p id="txt-day" class="text-teal-600 text-[10px] font-bold uppercase tracking-widest mb-1"></p>
                <h2 class="ancient text-3xl text-slate-950">El Dojo</h2>
            </div>
            <div id="streak-counter" class="text-amber-500 flex items-center gap-1.5 font-bold p-3 card-wisdom">
                <i class="fas fa-fire animate-pulse text-xl"></i> <span class="text-sm">1 DÍA</span>
            </div>
        </div>

        <div class="space-y-5">
            <button onclick="startMode('entrenar')" class="w-full card-wisdom p-7 flex items-center gap-6 text-left hover:border-teal-100 hover:bg-teal-50/30 transition-all">
                <div class="w-16 h-16 rounded-2xl bg-teal-50 flex items-center justify-center text-teal-600 text-3xl"><i class="fas fa-feather"></i></div>
                <div><h4 class="font-bold text-slate-950 text-lg">Entrenamiento</h4><p class="text-xs text-slate-500">Sin tiempo • Gana QI sin presión</p></div>
            </button>
            
            <button onclick="startMode('examen')" class="w-full card-wisdom p-7 flex items-center gap-6 text-left border-l-4 border-amber-400 hover:bg-amber-50/30 transition-all">
                <div class="w-16 h-16 rounded-2xl bg-amber-50 flex items-center justify-center text-amber-600 text-3xl"><i class="fas fa-scroll"></i></div>
                <div><h4 class="font-bold text-slate-950 text-lg">Examen Imperial</h4><p class="text-xs text-slate-500">20 preguntas • 5 min • Rango Maestro</p></div>
            </button>
        </div>
    </div>

    <div id="scr-game" class="screen hidden-screen">
        <header class="p-6 flex justify-between items-center border-b border-slate-100 bg-white sticky top-0 z-50">
            <button onclick="exitGame()" class="text-slate-400 hover:text-slate-900"><i class="fas fa-chevron-left"></i></button>
            <div class="text-center">
                <p id="game-title" class="ancient text-[10px] text-teal-700 tracking-widest uppercase"></p>
                <p id="exam-stats" class="text-xs font-bold text-slate-900 hidden">0 / 20</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-xs" id="game-timer-txt">--</div>
        </header>
        
        <div id="exam-timer-bar" class="hidden"></div>

        <main class="flex-1 p-6 flex flex-col justify-center bg-slate-50">
            <div id="q-container" class="card-wisdom p-9 mb-8 border-t-4 border-teal-500 relative">
                <i class="fas fa-yin-yang absolute -right-6 -bottom-6 text-teal-500/5 text-9xl"></i>
                <p id="q-category" class="text-[10px] font-bold text-teal-600 uppercase tracking-widest mb-5"></p>
                <h3 id="q-text" class="text-xl font-bold leading-snug text-slate-950 italic"></h3>
            </div>
            <div id="options-grid" class="grid gap-4"></div>
        </main>
    </div>

    <script>
        // --- MOTOR DE SONIDO ZEN (Mantenida Lógica Noche) ---
        const ZenAudio = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            active: false,
            init() { if(!this.active) { this.ctx.resume(); this.active = true; } },
            playSuccess() {
                this.init(); const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, this.ctx.currentTime); // C5
                osc.frequency.exponentialRampToValueAtTime(1046.50, this.ctx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.4);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.4);
            },
            playFail() {
                this.init(); const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(130.81, this.ctx.currentTime); // C3
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            }
        };

        // --- BASE DE DATOS TÉCNICA (Mantenida Lógica Noche) ---
        const DB = {
            weekly: {
                "Lunes": [ {q: "¿Punto Shu-Dorsal del Hígado?", a: "V18", opts: ["V18","V19","H14","VB20"]}, {q: "Emoción que lesiona al Hígado:", a: "Ira", opts: ["Ira","Miedo","Tristeza","Euforia"]} ],
                "Martes": [ {q: "Punto 'Shenmen' del Corazón:", a: "C7", opts: ["C7","PC6","ID3","C5"]}, {q: "El Corazón controla la lengua y:", a: "Vasos", opts: ["Vasos","Músculos","Piel","Huesos"]} ]
            },
            general: [
                {q: "Punto de cruce de los 3 Yin del pie:", a: "BP6", opts: ["BP6","BP9","R3","H3"]},
                {q: "Punto Maestro de la cara y boca:", a: "IG4", opts: ["IG4","P7","E36","VB20"]},
                {q: "El Qi Original (Yuan Qi) reside en:", a: "Ming Men", opts: ["Ming Men","Dantian","Pectoral","Corazón"]}
            ]
        };

        let state = { mode: '', xp: 0, score: 0, currentIdx: 0, timer: 0, timerInterval: null, totalExam: 20 };

        // --- LÓGICA DE JUEGO (Mantenida Lógica Noche) ---
        function initApp() {
            const today = new Intl.DateTimeFormat('es-ES', { weekday: 'long' }).format(new Date());
            const capitalizedDay = today.charAt(0).toUpperCase() + today.slice(1);
            document.getElementById('txt-day').innerText = `DÍA DE ${capitalizedDay.toUpperCase()}`;
            ZenAudio.init(); // Pre-cargar audio
            showScreen('scr-menu');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden-screen'));
            document.getElementById(id).classList.remove('hidden-screen');
        }

        function startMode(m) {
            state.mode = m; state.score = 0; state.currentIdx = 0;
            showScreen('scr-game');
            if(m === 'examen') {
                state.timer = 300; // 5 min
                document.getElementById('exam-stats').classList.remove('hidden');
                document.getElementById('exam-timer-bar').classList.remove('hidden');
                document.getElementById('game-title').innerText = "EXAMEN IMPERIAL";
                startTimer();
            } else {
                document.getElementById('exam-stats').classList.add('hidden');
                document.getElementById('exam-timer-bar').classList.add('hidden');
                document.getElementById('game-title').innerText = "ENTRENAMIENTO";
                document.getElementById('game-timer-txt').innerText = "∞";
            }
            renderQuestion();
        }

        function startTimer() {
            clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                state.timer--;
                const mins = Math.floor(state.timer/60); const secs = state.timer % 60;
                document.getElementById('game-timer-txt').innerText = `${mins}:${secs < 10 ? '0'+secs : secs}`;
                document.getElementById('exam-timer-bar').style.width = (state.timer / 300 * 100) + "%";
                if(state.timer <= 0) finishExam();
            }, 1000);
        }

        function renderQuestion() {
            const today = new Intl.DateTimeFormat('es-ES', { weekday: 'long' }).format(new Date());
            const dayKey = today.charAt(0).toUpperCase() + today.slice(1);
            const pool = [...(DB.weekly[dayKey] || []), ...DB.general];
            const q = pool[Math.floor(Math.random() * pool.length)];
            state.activeQ = q;
            document.getElementById('q-category').innerText = "SABIDURÍA ANCESTRAL";
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('exam-stats').innerText = `${state.currentIdx + 1} / ${state.totalExam}`;
            document.getElementById('options-grid').innerHTML = q.opts.sort(()=>Math.random()-0.5).map(o => `
                <button onclick="checkAnswer('${o}')" class="btn-option p-6 text-sm">${o}</button>
            `).join('');
        }

        function checkAnswer(ans) {
            if(ans === state.activeQ.a) {
                state.score++; state.xp += 40; ZenAudio.playSuccess(); flashSatori("Qi Correcto", "#14b8a6");
            } else { ZenAudio.playFail(); flashSatori("Desequilibrio", "#f87171"); }
            document.getElementById('xp-val').innerHTML = `${state.xp} <span class="text-[10px] text-teal-600 font-normal">QI</span>`;
            state.currentIdx++;
            if(state.mode === 'examen' && state.currentIdx >= state.totalExam) finishExam();
            else renderQuestion();
        }

        function flashSatori(msg, color) {
            const s = document.getElementById('satori'); s.innerText = msg; s.style.color = color; s.className = 'show';
            setTimeout(() => s.className = '', 1200);
        }

        function finishExam() { clearInterval(state.timerInterval); alert(`Examen Imperial finalizado.\nAciertos: ${state.score} / ${state.totalExam}`); exitGame(); }
        function exitGame() { clearInterval(state.timerInterval); showScreen('scr-menu'); }

        // --- ANDROID PWA SERVICES ---
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
