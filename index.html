<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIDI Master - Senda del Guerrero MTC</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --maidi-cyan: #2dd4bf;
            --maidi-gold: #fbbf24;
            --maidi-red: #f43f5e;
            --bg-deep: #020617;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: var(--bg-deep); 
            color: #f1f5f9; margin: 0; overflow: hidden; 
        }
        .ancient { font-family: 'Cinzel', serif; }

        /* --- LOGO ESFÉRICO 3D DINÁMICO --- */
        .spheric-container { 
            position: relative; width: 160px; height: 160px; 
            perspective: 1000px; margin: 0 auto; 
        }
        .sphere-orbit {
            position: absolute; inset: 0; border: 2px solid var(--maidi-cyan); 
            border-radius: 50%; opacity: 0.4; pointer-events: none;
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.2);
        }
        .orbit-x { animation: rotX 4s linear infinite; }
        .orbit-y { animation: rotY 6s linear infinite; border-color: var(--maidi-gold); }
        
        @keyframes rotX { 0% { transform: rotateX(70deg) rotateZ(0deg); } 100% { transform: rotateX(70deg) rotateZ(360deg); } }
        @keyframes rotY { 0% { transform: rotateY(75deg) rotateZ(0deg); } 100% { transform: rotateY(75deg) rotateZ(-360deg); } }

        .yinyang-center { 
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; filter: drop-shadow(0 0 20px var(--maidi-cyan));
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        /* --- PANTALLAS --- */
        .screen { 
            position: fixed; inset: 0; background: var(--bg-deep); 
            transition: 0.7s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10;
            display: flex; flex-direction: column;
        }
        .hidden-screen { opacity: 0; pointer-events: none; transform: translateY(30px) scale(0.98); }

        /* --- UI ELEMENTS & DOPAMINE --- */
        .glass { 
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 24px;
        }
        .btn-action { transition: 0.3s; position: relative; overflow: hidden; }
        .btn-action:active { transform: scale(0.95); }

        .qi-alert { animation: flicker 1.5s infinite; color: var(--maidi-red); text-shadow: 0 0 8px var(--maidi-red); }
        @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .win-glow { animation: success-glow 0.5s ease-out; }
        @keyframes success-glow {
            0% { box-shadow: 0 0 0 0px rgba(45, 212, 191, 0.5); }
            100% { box-shadow: 0 0 0 40px rgba(45, 212, 191, 0); }
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="max-w-md mx-auto h-screen relative shadow-2xl border-x border-white/5">

    <!-- NOTIFICACIÓN SATORI -->
    <div id="satori" class="fixed top-8 left-1/2 -translate-x-1/2 z-[2000] px-6 py-3 rounded-full glass border-cyan-500/50 text-[10px] font-bold tracking-widest opacity-0 transition-all pointer-events-none"></div>

    <!-- PANTALLA 1: SPLASH (EL LOGO) -->
    <div id="scr-splash" class="screen items-center justify-center p-10">
        <div class="spheric-container mb-12">
            <div class="sphere-orbit orbit-x"></div>
            <div class="sphere-orbit orbit-y"></div>
            <div class="yinyang-center"><i class="fas fa-yin-yang text-white"></i></div>
        </div>
        <h1 class="ancient text-4xl tracking-[12px] text-white">MAIDI</h1>
        <p class="text-[9px] tracking-[6px] text-cyan-500 uppercase mt-4 opacity-60 text-center">Protocolo de Maest
