<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maidi Master - Senda Eterna</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --maidi-cyan: #2dd4bf;
            --maidi-gold: #fbbf24;
            --bg-deep: #020617;
            --glass: rgba(15, 23, 42, 0.8);
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: var(--bg-deep); 
            color: #f1f5f9; margin: 0; overflow: hidden;
        }
        
        .ancient { font-family: 'Cinzel', serif; }

        /* --- EL LOGO ESFÉRICO CINÉTICO --- */
        .spheric-logo {
            position: relative; width: 160px; height: 160px;
            display: flex; align-items: center; justify-content: center;
        }
        .orbit-line {
            position: absolute; border: 1px solid rgba(45, 212, 191, 0.3);
            border-radius: 50%; animation: rotate linear infinite;
        }
        .line-1 { width: 100%; height: 40%; animation-duration: 4s; }
        .line-2 { width: 40%; height: 100%; animation-duration: 6s; }
        .line-3 { width: 90%; height: 90%; border-style: dashed; animation-duration: 10s; opacity: 0.1; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .yinyang-core {
            font-size: 3rem; color: var(--maidi-cyan);
            filter: drop-shadow(0 0 15px rgba(45, 212, 191, 0.6));
            animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }

        /* --- NAVEGACIÓN ENTRE PANTALLAS --- */
        .screen { 
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 100;
            display: flex; flex-direction: column; 
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden-screen { opacity: 0; transform: scale(1.1); pointer-events: none; }

        /* --- UI CRISTAL OSCURO & GRID --- */
        .grid-aura {
            position: absolute; inset: 0;
            background-image: radial-gradient(var(--maidi-cyan) 0.5px, transparent 0.5px);
            background-size: 30px 30px; opacity: 0.1;
        }

        .card-path {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            transition: all 0.3s;
            position: relative; overflow: hidden;
        }
        .card-path:active { transform: scale(0.96); border-color: var(--maidi-cyan); }
        
        .glow-dot {
            position: absolute; top: 0; right: 0; width: 4px; height: 4px;
            background: var(--maidi-cyan); box-shadow: 0 0 10px var(--maidi-cyan);
            border-radius: 50%; margin: 15px;
        }

        /* --- SATORI NOTIFICATION --- */
        #satori {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            padding: 10px 25px; border-radius: 100px; border: 1px solid var(--maidi-cyan);
            z-index: 2000; opacity: 0; transition: 0.4s; font-size: 0.8rem; font-weight: bold;
        }
        #satori.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="max-w-md mx-auto h-screen relative border-x border-white/5 shadow-2xl">

    <div id="satori"></div>

    <!-- PANTALLA 1: SPLASH -->
    <div id="scr-splash" class="screen items-center justify-center p-10">
        <div class="grid-aura"></div>
        <div class="spheric-logo mb-12">
            <div class="orbit-line line-1"></div>
            <div class="orbit-line line-2"></div>
            <div class="orbit-line line-3"></div>
            <i class="fas fa-yin-yang yinyang-core"></i>
        </div>
        <h1 class="ancient text-4xl tracking-[10px] text-white z-10">MAIDI</h1>
        <p class="text-[9px] tracking-[6px] text-cyan-500 uppercase mt-2 opacity-60 z-10">El Despertar del Maestro</p>
        <button onclick="toPabellon()" class="mt-24 px-12 py-4 bg-transparent border border-cyan-500/30 rounded-full text-cyan-400 font-bold tracking-widest text-[10px] hover:bg-cyan-500/10 transition-all z-10">SINTONIZAR</button>
    </div>

    <!-- PANTALLA 2: EL PABELLÓN (Hub Intermedio) -->
    <div id="scr-pabellon" class="screen hidden-screen p-8 pt-20">
        <div class="mb-10 text-center">
            <p class="ancient text-amber-500 text-[10px] tracking-widest mb-2 uppercase italic">Bienvenido al Linaje</p>
            <h2 class="ancient text-3xl text-white">Pabellón de Senda</h2>
        </div>

        <div class="grid gap-4 overflow-y-auto pb-10">
            <!-- DOJO: ABIERTO -->
            <div onclick="toAction('dojo')" class="card-path p-6 flex items-center gap-6 group">
                <div class="glow-dot"></div>
                <div class="w-14 h-14 rounded-2xl bg-cyan-500/10 flex items-center justify-center text-2xl text-cyan-400">
                    <i class="fas fa-bolt"></i>
                </div>
                <div>
                    <h4 class="font-bold text-white text-sm">Dojo de Casos</h4>
                    <p class="text-[9px] text-slate-500">Cultiva tu diagnóstico rápido</p>
                </div>
            </div>

            <!-- BIBLIOTECA: ABIERTO -->
            <div onclick="toAction('atlas')" class="card-path p-6 flex items-center gap-6">
                <div class="w-14 h-14 rounded-2xl bg-amber-500/10 flex items-center justify-center text-2xl text-amber-500">
                    <i class="fas fa-book-medical"></i>
                </div>
                <div>
                    <h4 class="font-bold text-white text-sm">Biblioteca de Rollos</h4>
                    <p class="text-[9px] text-slate-500">Explora la sabiduría acumulada</p>
                </div>
            </div>

            <!-- ALQUIMIA: BLOQUEADO (Pulse) -->
            <div onclick="showSatori('Debes alcanzar el grado Brote', '#fbbf24')" class="card-path p-6 flex items-center gap-6 opacity-40">
                <div class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center text-2xl text-slate-500">
                    <i class="fas fa-lock animate-pulse"></i>
                </div>
                <div>
                    <h4 class="font-bold text-slate-400 text-sm">Alquimia de Pulso</h4>
                    <p class="text-[9px] text-slate-600">Requiere Nivel 2</p>
                </div>
            </div>

            <!-- JARDÍN: ABIERTO -->
            <div onclick="toAction('skills')" class="card-path p-6 flex items-center gap-6">
                <div class="w-14 h-14 rounded-2xl bg-purple-500/10 flex items-center justify-center text-2xl text-purple-400">
                    <i class="fas fa-gem"></i>
                </div>
                <div>
                    <h4 class="font-bold text-white text-sm">Jardín de Habilidades</h4>
                    <p class="text-[9px] text-slate-500">Tu colección de reliquias</p>
                </div>
            </div>
        </div>
    </div>

    <!-- PANTALLA 3: INTERFAZ DE ACCIÓN -->
    <div id="scr-action" class="screen hidden-screen">
        <header class="p-6 flex justify-between items-center border-b border-white/5">
            <button onclick="toPabellon()" class="text-slate-400"><i class="fas fa-chevron-left"></i></button>
            <div class="text-center">
                <p id="action-title" class="ancient text-[10px] text-cyan-400 tracking-widest"></p>
                <div id="xp-indicator" class="text-[9px] font-bold text-amber-500">0 QI</div>
            </div>
            <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-[10px] font-bold" id="action-timer">--</div>
        </header>

        <main id="action-content" class="flex-1 p-8 overflow-y-auto">
            <!-- El contenido dinámico se inyecta aquí -->
        </main>
    </div>

    <script>
        let state = { xp: 0, currentTab: '' };

        const DB = {
            syndromes: [
                {q: "Paciente con tos débil, falta de aire y sudoración espontánea.", a: "Def. de Qi de Pulmón", o: ["Def. de Qi de Pulmón", "Calor en Pulmón", "Def. de Riñón"]},
                {q: "Cefalea temporal, irritabilidad y sabor amargo en la boca.", a: "Fuego de Hígado", o: ["Fuego de Hígado", "Viento Externo", "Def. de Sangre"]}
            ]
        };

        function showSatori(msg, color = "#2dd4bf") {
            const s = document.getElementById('satori');
            s.innerText = msg;
            s.style.borderColor = color;
            s.classList.add('visible');
            setTimeout(() => s.classList.remove('visible'), 2000);
        }

        function toPabellon() {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden-screen'));
            document.getElementById('scr-pabellon').classList.remove('hidden-screen');
        }

        function toAction(type) {
            state.currentTab = type;
            document.getElementById('scr-pabellon').classList.add('hidden-screen');
            document.getElementById('scr-action').classList.remove('hidden-screen');
            renderAction(type);
        }

        function renderAction(type) {
            const container = document.getElementById('action-content');
            const title = document.getElementById('action-title');
            container.innerHTML = '';
            
            if(type === 'dojo') {
                title.innerText = "DOJO DE CASOS";
                const q = DB.syndromes[Math.floor(Math.random()*DB.syndromes.length)];
                container.innerHTML = `
                    <div class="card-path p-8 mb-8 border-t-2 border-cyan-500">
                        <p class="text-[9px] font-bold text-cyan-500 uppercase tracking-widest mb-4 italic">Caso Clínico</p>
                        <h3 class="text-xl font-bold leading-relaxed italic">"${q.q}"</h3>
                    </div>
                    <div class="grid gap-3">
                        ${q.o.map(opt => `<button onclick="checkAns('${opt}', '${q.a}')" class="card-path p-5 text-sm font-bold text-left hover:bg-cyan-500/10">${opt}</button>`).join('')}
                    </div>
                `;
            } else if(type === 'atlas') {
                title.innerText = "BIBLIOTECA";
                container.innerHTML = `
                    <div class="space-y-4">
                        ${DB.syndromes.map(s => `
                            <div class="card-path p-5 border-l-2 border-amber-500/50">
                                <h4 class="text-amber-500 font-bold text-xs">${s.a}</h4>
                                <p class="text-[10px] text-slate-400 mt-2 italic">${s.q}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if(type === 'skills') {
                title.innerText = "JARDÍN DE SKILLS";
                container.innerHTML = `
                    <div class="grid grid-cols-2 gap-4">
                        <div class="card-path p-6 text-center opacity-50">
                            <i class="fas fa-eye text-2xl mb-3 text-cyan-500"></i>
                            <p class="text-[9px] font-bold uppercase">Visión de Lince</p>
                        </div>
                        <div class="card-path p-6 text-center opacity-20">
                            <i class="fas fa-fire text-2xl mb-3"></i>
                            <p class="text-[9px] font-bold uppercase">Maestro de Agujas</p>
                        </div>
                    </div>
                `;
            }
        }

        function checkAns(sel, corr) {
            if(sel === corr) {
                state.xp += 20;
                showSatori("+20 QI - Armonía lograda");
                document.getElementById('xp-indicator').innerText = `${state.xp} QI`;
                renderAction('dojo');
            } else {
                showSatori("Energía dispersa - Reflexiona", "#ef4444");
            }
        }
    </script>
</body>
</html>
