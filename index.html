<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máster MTC - Maidi Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;500;700&display=swap');
        
        :root { --accent: #2dd4bf; --gold: #fbbf24; --deep: #05080a; }
        body { font-family: 'Quicksand', sans-serif; background: var(--deep); color: #e2e8f0; margin: 0; overflow: hidden; }
        h1, h2, .ancient-font { font-family: 'Cinzel', serif; }

        /* Estructura de Pantallas - Corregido */
        .screen { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 50; background: var(--deep); transition: all 0.8s cubic-bezier(0.7, 0, 0.3, 1); }
        .hidden-screen { transform: scale(1.1); opacity: 0; pointer-events: none; visibility: hidden; }

        /* Icono de Nivel Evolutivo */
        .lvl-icon { width: 50px; height: 50px; background: rgba(45, 212, 191, 0.1); border: 1px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--gold); box-shadow: 0 0 15px rgba(45, 212, 191, 0.3); }

        /* Logo Ancestral */
        .maidi-symbol { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
        .ring { position: absolute; inset: 0; border: 2px solid var(--accent); border-radius: 50%; border-top-color: transparent; animation: spin 10s linear infinite; }
        .ring-inner { position: absolute; inset: 15px; border: 1px solid var(--gold); border-radius: 50%; border-bottom-color: transparent; animation: spin 6s linear reverse infinite; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Tarjetas y UI */
        .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; backdrop-filter: blur(10px); }
        .tab-content { display: none; height: calc(100vh - 180px); overflow-y: auto; padding: 20px; }
        .active-tab { display: block; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn-ancient { background: linear-gradient(135deg, #0f172a 0%, #020617 100%); border: 1px solid rgba(45, 212, 191, 0.4); border-radius: 20px; transition: all 0.3s; }
        .btn-ancient:active { transform: scale(0.95); border-color: var(--gold); }
    </style>
</head>
<body class="max-w-md mx-auto h-screen relative shadow-2xl overflow-hidden border-x border-white/5">

    <!-- 1. PANTALLA DE BIENVENIDA (LOGO ANCESTRAL) -->
    <div id="screen-splash" class="screen flex flex-col items-center justify-center p-8">
        <div class="maidi-symbol mb-8">
            <div class="ring"></div>
            <div class="ring-inner"></div>
            <i class="fas fa-yin-yang text-4xl text-white"></i>
        </div>
        <h1 class="text-3xl font-bold tracking-[4px] text-white text-center">MÁSTER MTC</h1>
        <div class="h-[1px] w-24 bg-gradient-to-r from-transparent via-cyan-500 to-transparent my-4"></div>
        <p class="ancient-font text-[10px] text-amber-400 tracking-[3px] uppercase">Maidi Project • Wisdom Path</p>
        
        <button onclick="toSelector()" class="mt-24 group relative">
            <div class="absolute -inset-4 bg-cyan-500/20 blur-xl rounded-full"></div>
            <div class="relative px-12 py-4 btn-ancient text-cyan-400 font-bold tracking-widest text-sm flex items-center gap-3">
                INICIAR DESPERTAR <i class="fas fa-scroll"></i>
            </div>
        </button>
    </div>

    <!-- 2. SELECTOR DE CAMINO (INTERMEDIO) -->
    <div id="screen-selector" class="screen hidden-screen flex flex-col p-8 bg-[#020408]">
        <div class="mt-10">
            <p class="ancient-font text-amber-500 text-xs tracking-widest mb-2">MAIDI ECOSYSTEM</p>
            <h2 class="text-4xl font-bold text-white mb-10">Escoge tu <br><span class="text-cyan-400">Disciplina</span></h2>
        </div>

        <div class="space-y-6">
            <button onclick="launchApp('quiz')" class="w-full glass-card p-6 flex items-center gap-6 text-left border-l-4 border-l-cyan-500">
                <div class="text-3xl text-cyan-400"><i class="fas fa-leaf"></i></div>
                <div><h4 class="font-bold text-white">Dojo de Casos</h4><p class="text-xs text-slate-500">Gana experiencia para ascender</p></div>
            </button>

            <button id="btn-atlas" onclick="launchApp('atlas')" class="w-full glass-card p-6 flex items-center gap-6 text-left opacity-40 transition-all">
                <div class="text-3xl text-slate-600" id="icon-atlas"><i class="fas fa-lock"></i></div>
                <div><h4 class="font-bold text-slate-400" id="txt-atlas">Atlas Sagrado</h4><p class="text-xs text-slate-600">Requiere Nivel 2 (Brote)</p></div>
            </button>

            <button id="btn-dieta" onclick="launchApp('dieta')" class="w-full glass-card p-6 flex items-center gap-6 text-left opacity-40 transition-all">
                <div class="text-3xl text-slate-600" id="icon-dieta"><i class="fas fa-lock"></i></div>
                <div><h4 class="font-bold text-slate-400" id="txt-dieta">Alquimia Dietética</h4><p class="text-xs text-slate-600">Requiere Nivel 3 (Flor)</p></div>
            </button>
        </div>
    </div>

    <!-- 3. APLICACIÓN PRINCIPAL -->
    <div id="app-main" class="h-full flex flex-col relative">
        <!-- HEADER DINÁMICO -->
        <header class="p-6 border-b border-white/5 bg-black/40 backdrop-blur-md flex justify-between items-center sticky top-0 z-30">
            <div class="flex items-center gap-4">
                <div id="level-icon-container" class="lvl-icon">
                    <i class="fas fa-seedling" id="lvl-visual"></i>
                </div>
                <div>
                    <h1 class="ancient-font text-xs font-bold text-amber-500 tracking-widest">MÁSTER MTC</h1>
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-tighter" id="lvl-label">Nivel 1: Semilla</p>
                </div>
            </div>
            <div class="text-right">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-cyan-400" id="xp-display">0</span>
                    <div class="w-12 h-1 bg-white/10 rounded-full overflow-hidden"><div id="xp-bar" class="h-full bg-cyan-500 transition-all" style="width: 0%"></div></div>
                </div>
                <p class="text-[9px] text-slate-500 uppercase font-bold mt-1 tracking-widest">Qi Acumulado</p>
            </div>
        </header>

        <main class="flex-1 relative overflow-hidden">
            <!-- PESTAÑA QUIZ -->
            <div id="tab-quiz" class="tab-content active-tab p-6">
                <div class="glass-card p-8 mb-8 border-t-2 border-t-cyan-500 relative overflow-hidden">
                    <div class="absolute -right-10 -bottom-10 text-white/5 text-9xl ancient-font">Qi</div>
                    <p id="q-cat" class="text-[10px] font-bold text-cyan-400 uppercase tracking-[3px] mb-4 italic">Simbología Zang-Fu</p>
                    <h2 id="q-text" class="text-xl font-bold leading-relaxed text-white">...</h2>
                </div>
                <div id="q-options" class="grid gap-4"></div>
            </div>

            <!-- PESTAÑA ATLAS -->
            <div id="tab-atlas" class="tab-content p-6">
                <h2 class="text-3xl font-bold mb-6 text-white">Atlas Maestro</h2>
                <div id="atlas-list" class="space-y-4"></div>
            </div>

            <!-- PESTAÑA DIETA -->
            <div id="tab-dieta" class="tab-content p-6">
                <h2 class="text-3xl font-bold mb-6 text-white">Dietética Sagrada</h2>
                <div id="diet-list" class="grid grid-cols-2 gap-4"></div>
            </div>

            <!-- PESTAÑA SKILLS -->
            <div id="tab-skills" class="tab-content p-6">
                <h2 class="text-3xl font-bold mb-6 text-white text-center">Evolución Interna</h2>
                <div id="skills-grid" class="grid grid-cols-2 gap-6"></div>
            </div>
        </main>

        <!-- NAVEGACIÓN -->
        <nav class="bg-black/80 border-t border-white/5 flex justify-around p-4 pb-8 z-40">
            <button onclick="switchTab('quiz')" class="nav-btn text-cyan-400 text-xl"><i class="fas fa-scroll"></i></button>
            <button onclick="switchTab('atlas')" class="nav-btn text-slate-600 text-xl"><i class="fas fa-map-marked-alt"></i></button>
            <button onclick="switchTab('dieta')" class="nav-btn text-slate-600 text-xl"><i class="fas fa-mortar-pestle"></i></button>
            <button onclick="switchTab('skills')" class="nav-btn text-slate-600 text-xl"><i class="fas fa-hamsa"></i></button>
        </nav>
    </div>

    <script>
        const DB = {
            syndromes: [
                { n: "Deficiencia Qi Pulmón", s: "Disnea, voz débil, sudoración diurna, cansancio", p: "P7, P9, V13", d: "Avena, jengibre, higos" },
                { n: "Fuego de Hígado", s: "Ojos rojos, sabor amargo, cefalea temporal, ira", p: "H2, H3, VB20", d: "Té de crisantemo, espinacas" },
                { n: "Humedad en Bazo", s: "Heces pastosas, pesadez, náuseas, lengua saburral", p: "BP9, BP6, V20", d: "Adzuki, calabaza, mijo" }
            ],
            levels: [
                { lvl: 1, name: "Semilla", icon: "fa-seedling" },
                { lvl: 2, name: "Brote", icon: "fa-leaf" },
                { lvl: 3, name: "Flor de Loto", icon: "fa-spa" },
                { lvl: 4, name: "Maestro Árbol", icon: "fa-tree" }
            ]
        };

        let state = { xp: 0, currentLvl: 1, qIdx: 0 };

        // TRANSICIONES CORREGIDAS
        function toSelector() {
            document.getElementById('screen-splash').classList.add('hidden-screen');
            document.getElementById('screen-selector').classList.remove('hidden-screen');
        }

        function launchApp(tab) {
            if(tab === 'atlas' && state.currentLvl < 2) return alert("Debes alcanzar el nivel Brote");
            if(tab === 'dieta' && state.currentLvl < 3) return alert("Debes alcanzar el nivel Flor");
            
            document.getElementById('screen-selector').classList.add('hidden-screen');
            switchTab(tab);
            renderQuiz();
            renderAtlas();
            renderDieta();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById('tab-' + tabId).classList.add('active-tab');
        }

        function renderQuiz() {
            const q = DB.syndromes[state.qIdx];
            document.getElementById('q-text').innerText = `"${q.s}"`;
            document.getElementById('q-options').innerHTML = DB.syndromes.map(s => `
                <button onclick="check('${s.n}')" class="btn-ancient p-5 text-left text-sm font-bold text-slate-300">
                    ${s.n}
                </button>
            `).join('');
        }

        function check(ans) {
            if(ans === DB.syndromes[state.qIdx].n) {
                state.xp += 40;
                state.qIdx = (state.qIdx + 1) % DB.syndromes.length;
                updateProgress();
                renderQuiz();
            } else {
                alert("La energía no es correcta. Escucha el pulso.");
            }
        }

        function updateProgress() {
            const xpDisplay = document.getElementById('xp-display');
            const xpBar = document.getElementById('xp-bar');
            xpDisplay.innerText = state.xp;
            xpBar.style.width = (state.xp % 100) + "%";

            let newLvl = Math.floor(state.xp / 100) + 1;
            if(newLvl > state.currentLvl && newLvl <= 4) {
                state.currentLvl = newLvl;
                applyLevelChange();
            }
        }

        function applyLevelChange() {
            const levelData = DB.levels[state.currentLvl - 1];
            document.getElementById('lvl-visual').className = `fas ${levelData.icon}`;
            document.getElementById('lvl-label').innerText = `Nivel ${state.currentLvl}: ${levelData.name}`;
            
            // Desbloqueo visual en selector
            if(state.currentLvl >= 2) {
                document.getElementById('btn-atlas').classList.remove('opacity-40');
                document.getElementById('icon-atlas').innerHTML = '<i class="fas fa-map-marked-alt text-cyan-400"></i>';
                document.getElementById('txt-atlas').classList.replace('text-slate-400', 'text-white');
            }
            if(state.currentLvl >= 3) {
                document.getElementById('btn-dieta').classList.remove('opacity-40');
                document.getElementById('icon-dieta').innerHTML = '<i class="fas fa-mortar-pestle text-amber-500"></i>';
                document.getElementById('txt-dieta').classList.replace('text-slate-400', 'text-white');
            }
            alert(`¡Has evolucionado a ${levelData.name}!`);
        }

        function renderAtlas() {
            document.getElementById('atlas-list').innerHTML = DB.syndromes.map(s => `
                <div class="glass-card p-4 border border-white/5">
                    <h4 class="text-cyan-400 font-bold mb-2">${s.n}</h4>
                    <p class="text-[10px] text-slate-400 mb-2">${s.s}</p>
                    <div class="text-[9px] font-bold text-amber-500 uppercase">Acupuntura: ${s.p}</div>
                </div>
            `).join('');
        }

        function renderDieta() {
            document.getElementById('diet-list').innerHTML = DB.syndromes.map(s => `
                <div class="glass-card p-4 text-center">
                    <i class="fas fa-leaf text-amber-400 mb-2"></i>
                    <h5 class="text-[10px] font-bold text-white uppercase">${s.n}</h5>
                    <p class="text-[9px] text-slate-400 italic">${s.d}</p>
                </div>
            `).join('');
        }

        // Inicializar
        renderQuiz();
    </script>
</body>
</html>
