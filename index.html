<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master MTC - Maidi Project</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2dd4bf">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1041/1041844.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Quicksand:wght@400;600;700&display=swap');
        
        :root { --accent: #2dd4bf; --gold: #fbbf24; --bg: #010204; --error: #f87171; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: #e2e8f0; margin: 0; overflow: hidden; user-select: none; }
        h1, .ancient { font-family: 'Cinzel', serif; }

        /* Capas de Pantalla */
        .screen { position: fixed; inset: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: flex; flex-direction: column; transition: 0.5s ease-in-out; }
        .hidden-screen { transform: scale(1.1); opacity: 0; pointer-events: none; visibility: hidden; }

        /* Loto Geométrico (Carga) */
        .loto { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
        .p-loto { position: absolute; width: 30px; height: 30px; border: 2px solid var(--accent); border-radius: 0 100% 0 100%; transform-origin: center; animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { opacity: 0.3; transform: rotate(var(--r)) scale(1); } 50% { opacity: 1; filter: drop-shadow(0 0 15px var(--accent)); transform: rotate(var(--r)) scale(1.2); } }

        /* UI Elementos */
        .glass { background: rgba(10, 15, 25, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); border-radius: 28px; }
        .tab-content { display: none; height: calc(100vh - 170px); overflow-y: auto; padding: 20px; }
        .active-tab { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Notificación Satori */
        #satori { position: fixed; top: 25px; left: 50%; transform: translateX(-50%) translateY(-20px); padding: 12px 30px; border-radius: 50px; font-weight: bold; font-size: 0.75rem; opacity: 0; transition: all 0.4s; z-index: 500; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); white-space: nowrap; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #satori.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    
        /* Barra de Tiempo Duelo */
        #duel-timer { height: 4px; background: var(--accent); width: 100%; transition: width linear; }
    </style>
</head>
<body class="max-w-md mx-auto h-screen relative border-x border-white/5 shadow-2xl overflow-hidden">

    <div id="satori"></div>

    <div id="scr-splash" class="screen items-center justify-center p-8">
        <div class="loto mb-10">
            <div class="p-loto" style="--r:0deg"></div><div class="p-loto" style="--r:45deg"></div>
            <div class="p-loto" style="--r:90deg"></div><div class="p-loto" style="--r:135deg"></div>
            <div class="p-loto" style="--r:180deg"></div><div class="p-loto" style="--r:225deg"></div>
            <div class="p-loto" style="--r:270deg"></div><div class="p-loto" style="--r:315deg"></div>
            <i class="fas fa-yin-yang text-white text-xl z-10"></i>
        </div>
        <h1 class="text-3xl font-bold tracking-[10px] text-white">MÁSTER MTC</h1>
        <p class="ancient text-[10px] text-amber-500 tracking-[5px] mt-2 uppercase">Conciencia • Maidi Project</p>
        <button onclick="toSelector()" class="mt-28 px-14 py-4 bg-cyan-500/5 border border-cyan-500/30 rounded-full text-cyan-400 font-bold tracking-widest text-[10px] hover:bg-cyan-500/10 transition-all">SINTONIZAR QI</button>
    </div>

    <div id="scr-selector" class="screen hidden-screen p-8 pt-20">
        <div class="flex justify-between items-center mb-10">
            <div>
                <p id="current-day" class="text-[10px] font-bold text-amber-500 uppercase tracking-widest">---</p>
                <h2 class="ancient text-4xl text-white italic">El Camino.</h2>
            </div>
            <div id="streak-counter" class="text-orange-400 flex items-center gap-1.5 font-bold">
                <i class="fas fa-fire animate-pulse"></i> <span class="text-sm">1 DÍA</span>
            </div>
        </div>

        <div class="glass p-6 border-l-4 border-amber-500/50 mb-10 flex items-center gap-5">
            <i id="week-icon" class="fas fa-calendar-alt text-amber-500 text-3xl"></i>
            <div>
                <p class="text-[9px] font-bold text-amber-500 uppercase tracking-[2px]">Misión Semanal</p>
                <p id="week-task" class="text-xs font-bold text-white mt-1">Cargando ciclo circadiano...</p>
                <p class="text-[9px] text-slate-500 italic mt-1">+150 QI extra al completar el Dojo</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="launchApp('quiz')" class="glass p-6 flex flex-col items-center gap-3 border-b-4 border-cyan-500">
                <i class="fas fa-bolt text-cyan-400 text-2xl"></i>
                <p class="font-bold text-[10px] uppercase">Dojo Qi</p>
            </button>
            <button onclick="launchApp('atlas')" class="glass p-6 flex flex-col items-center gap-3 border-b-4 border-rose-500 opacity-30">
                <i class="fas fa-book-medical text-rose-500 text-2xl"></i>
                <p class="font-bold text-[10px] uppercase">Compendio</p>
            </button>
        </div>
        <button onclick="shareQi()" class="w-full mt-6 px-10 py-3 bg-cyan-500/5 border border-white/5 text-cyan-300 text-[9px] font-bold rounded-full uppercase"><i class="fas fa-share-alt mr-2"></i>Sincronizar mi Qi con amigos</button>
    </div>

    <div id="app-main" class="flex flex-col h-full">
        <header class="p-6 glass flex justify-between items-center rounded-none border-t-0 border-x-0 bg-slate-900/40">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-cyan-500/5 border border-cyan-500/20 flex items-center justify-center">
                    <i class="fas fa-seedling text-cyan-400 text-xl"></i>
                </div>
                <div>
                    <h1 class="ancient text-[9px] tracking-widest text-amber-500">MÁSTER MTC</h1>
                    <p class="text-[12px] font-bold text-white"> Discípulo Maidi</p>
                </div>
            </div>
            <p class="text-xl font-bold text-white tracking-tighter" id="xp-val">0 <span class="text-[10px] text-cyan-400 font-normal">QI</span></p>
        </header>

        <main class="flex-1 overflow-hidden relative">
            <div id="tab-quiz" class="tab-content active-tab p-6">
                <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden mb-6"><div id="duel-timer"></div></div>
                <div class="glass p-8 rounded-[2.5rem] border-t-2 border-cyan-500 mb-8 text-center relative overflow-hidden">
                    <i class="fas fa-atom absolute -right-6 -bottom-6 text-white/5 text-9xl"></i>
                    <p id="q-mode" class="text-[9px] font-bold text-cyan-300 uppercase tracking-widest mb-4">Pregunta de Dojo</p>
                    <h2 id="q-text" class="text-lg font-bold leading-relaxed text-slate-100 italic">"..."</h2>
                </div>
                <div id="q-options" class="grid gap-4"></div>
            </div>

            <div id="tab-atlas" class="tab-content">
                <h2 class="ancient text-2xl text-white mb-6">Compendio Maestro</h2>
                <div id="atlas-list" class="space-y-4 pb-12"></div>
            </div>
        </main>

        <nav class="p-4 glass bg-black/95 border-t border-white/5 flex justify-around items-center rounded-none">
            <button onclick="switchTab('quiz')" class="text-cyan-400 text-xl p-3"><i class="fas fa-bolt"></i></button>
            <button onclick="switchTab('atlas')" class="text-slate-600 text-xl p-3"><i class="fas fa-scroll"></i></button>
        </nav>
    </div>

    <script>
        // CONFIGURACIÓN MAIDI & DATOS
        const WEEK_PLAN = [
            { d: "Lunes", i: "fa-leaf", o: "Hígado", q: "Estanc. Qi de Hígado" },
            { d: "Martes", i: "fa-fire", o: "Corazón", q: "Fuego de Corazón" },
            { d: "Miércoles", i: "fa-brain", o: "Maestro de Mente", q: "Insonmio Maidi" }, // Pregunta Especial
            { d: "Jueves", i: "fa-vial", o: "Pulmón", q: "Def. Qi de Pulmón" },
            { d: "Viernes", i: "fa-seedling", o: "Bazo/Estómago", q: "Humedad en Bazo" },
            { d: "Sábado", i: "fa-water", o: "Riñón", q: "Def. Yin de Riñón" },
            { d: "Domingo", i: "fa-sun", o: "Día de Cultivo Vital", q: "Repaso General" }
        ];

        const DB = {
    // MISIONES SEMANALES: 7 Categorías, 5 preguntas por categoría (Expandible)
    weekly_vault: {
        "Lunes": { // MADERA - HÍGADO/VB
            questions: [
                { q: "Paciente con cefalea temporal, ojos rojos y sabor amargo. ¿Síndrome?", a: "Fuego de Hígado ascendente" },
                { q: "Punto Shu-Dorsal del Hígado:", a: "V18 (Ganshu)" },
                { q: "La lengua en el Estancamiento de Qi de Hígado suele estar:", a: "Normal o bordes ligeramente rojos" },
                { q: "¿Qué estructura gobierna el Hígado según la MTC?", a: "Los tendones y ligamentos" },
                { q: "Punto de apertura del cinturón (Dai Mai):", a: "VB41 (Zulinqi)" }
            ]
        },
        "Martes": { // FUEGO - CORAZÓN/ID
            questions: [
                { q: "Punto Luo del Corazón:", a: "C5 (Tongli)" },
                { q: "Punta de la lengua muy roja con puntos rojos. Indica:", a: "Fuego de Corazón" },
                { q: "¿Cuál es el punto 'Puerta del Espíritu'?", a: "C7 (Shenmen)" },
                { q: "Síndrome: Palpitaciones, mala memoria y tez pálida.", a: "Deficiencia de Sangre de Corazón" },
                { q: "El Corazón se manifiesta en el exterior a través de:", a: "La lengua" }
            ]
        },
        "Miércoles": { // ORÁCULO - TEORÍA FUNDAMENTAL
            questions: [
                { q: "Ciclo de Control (Ke): ¿Qué elemento controla a la Tierra?", a: "Madera" },
                { q: "¿Cuál es la función principal del San Jiao?", a: "Paso de fluidos y transformación de Qi" },
                { q: "El Qi que circula por los meridianos se llama:", a: "Zhong Qi" },
                { q: "Relación Yin/Yang: El interior es...", a: "Yin" },
                { q: "¿Qué energía climática se asocia al Otoño?", a: "Sequedad" }
            ]
        },
        "Jueves": { // METAL - PULMÓN/IG
            questions: [
                { q: "Punto Mu-Frontal del Pulmón:", a: "P1 (Zhongfu)" },
                { q: "El Pulmón regula el paso de las aguas hacia:", a: "El Riñón y la Vejiga" },
                { q: "Saburra blanca, fina y miedo al frío. Indica:", a: "Viento-Frío Externo" },
                { q: "Punto maestro de la cara y la boca:", a: "IG4 (Hegu)" },
                { q: "La emoción que daña al Pulmón es:", a: "La tristeza y melancolía" }
            ]
        },
        "Viernes": { // TIERRA - BAZO/E
            questions: [
                { q: "¿Quién es el responsable de 'subir el Qi puro'?", a: "El Bazo" },
                { q: "Punto Mar-He inferior del Estómago:", a: "E36 (Zusanli)" },
                { q: "Lengua pálida, hinchada con marcas dentales:", a: "Deficiencia de Qi de Bazo" },
                { q: "El Bazo controla la sangre...", a: "Manteniéndola dentro de los vasos" },
                { q: "Sabor asociado a la fase Tierra:", a: "Dulce" }
            ]
        },
        "Sábado": { // AGUA - RIÑÓN/V
            questions: [
                { q: "El Riñón es el 'Sagrario' de:", a: "El Jing (Esencia)" },
                { q: "Punto Yuan (Fuente) del Riñón:", a: "R3 (Taixi)" },
                { q: "Síndrome: Dolor lumbar, rodillas débiles y acúfenos.", a: "Deficiencia de Qi de Riñón" },
                { q: "¿Qué órgano controla la recepción del Qi respiratorio?", a: "El Riñón" },
                { q: "Punto de reunión de la Médula:", a: "VB39 (Xuanzhong)" }
            ]
        },
        "Domingo": { // REPASO GENERAL
            questions: [
                { q: "Un pulso 'Cuerda' (Xian) es típico de:", a: "Problemas de Hígado o Dolor" },
                { q: "Punto de cruce de los 3 meridianos Yin del pie:", a: "BP6 (Sanyinjiao)" },
                { q: "La 'Madre' de la Madera es:", a: "El Agua" },
                { q: "¿Dónde nace el Qi Original (Yuan Qi)?", a: "Entre los Riñones (Ming Men)" },
                { q: "La cara roja indica:", a: "Calor" }
            ]
        }
    }
};

        let state = { xp: 0, currentQ: null, timeMode: false };
        let currentDayData;

        // --- MOTOR CIRCADIANO SEMANAL ---
        function initWeeklyPlan() {
            const todayIndex = new Date().getDay(); // 0=Domingo, 1=Lunes
            // Ajuste porque JS empieza en Domingo(0) y nosotros queremos Lunes(0)
            let adjustedIndex = todayIndex === 0 ? 6 : todayIndex - 1; 
            currentDayData = WEEK_PLAN[adjustedIndex];
            
            document.getElementById('current-day').innerText = currentDayData.d;
            document.getElementById('week-icon').className = `fas ${currentDayData.i} text-amber-500 text-3xl`;
            document.getElementById('week-task').innerText = `Enfoque en ${currentDayData.o}`;
            showSatori(`Hoy es día de ${currentDayData.o}`);
        }

        // --- NAVEGACIÓN ---
        function toSelector() { document.getElementById('scr-splash').classList.add('hidden-screen'); document.getElementById('scr-selector').classList.remove('hidden-screen'); initWeeklyPlan(); }
        
        function launchApp(t) { document.getElementById('scr-selector').classList.add('hidden-screen'); switchTab(t); if(t === 'quiz') nextQ(); if(t === 'atlas') renderAtlas(); }
        
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.getElementById('tab-'+t).classList.add('active-tab');
            document.querySelectorAll('nav button').forEach((b, i) => b.className = ( (i==0&&t=='quiz')||(i==1&&t=='atlas') ) ? 'text-cyan-400 text-xl p-3' : 'text-slate-600 text-xl p-3');
        }

        // --- MOTOR DE PREGUNTAS (Adaptativo) ---
       function nextQ() {
    const today = new Date().toLocaleDateString('es-ES', { weekday: 'long' });
    const dayKey = today.charAt(0).toUpperCase() + today.slice(1);
    
    // Seleccionamos el banco de preguntas del día actual
    const dayPool = DB.weekly_vault[dayKey] || DB.weekly_vault["Domingo"];
    const pool = dayPool.questions;
    
    // Elegimos una pregunta aleatoria del set diario
    state.currentQ = pool[Math.floor(Math.random() * pool.length)];
    
    // UI Update
    document.getElementById('q-mode').innerText = `ENFOQUE: ${currentDayData.o}`;
    document.getElementById('q-text').innerText = state.currentQ.q;
    
    // Generar opciones (la correcta + 3 aleatorias de toda la base de datos para dificultar)
    const allAnswers = Object.values(DB.weekly_vault).flatMap(d => d.questions.map(q => q.a));
    let options = [state.currentQ.a];
    while(options.length < 4) {
        let randomA = allAnswers[Math.floor(Math.random() * allAnswers.length)];
        if(!options.includes(randomA)) options.push(randomA);
    }
    
    document.getElementById('q-options').innerHTML = options.sort(() => Math.random() - 0.5).map(o => `
        <button onclick="check('${o}')" class="glass p-5 rounded-2xl text-left font-bold text-slate-300 text-sm active:bg-cyan-500/20 transition-all border border-white/5 hover:border-cyan-500/50">${o}</button>
    `).join('');
}

            // Lógica de Tiempo
            const timer = document.getElementById('duel-timer');
            timer.style.transition = 'none'; timer.style.width = '100%';
            if(state.timeMode) {
                setTimeout(()=>{ timer.style.transition='width 7s linear'; timer.style.width='0%'; }, 50);
                this.timeFail = setTimeout(() => { showSatori("Qi dispersado por lentitud", "error"); nextQ(); }, 7000);
            }
        }

        function check(ans) {
            clearTimeout(this.timeFail);
            if(ans === state.currentQ.name) {
                state.xp += 40;
                // Bonus misión semanal
                if(state.currentQ.name === currentDayData.q) state.xp += 10;
                showSatori("Perfecta sintonía Maidi");
                document.getElementById('xp-val').innerHTML = `${state.xp} <span class="text-[10px] text-cyan-400 font-normal">QI</span>`;
                nextQ();
            } else { showSatori("Energía inestable...", "error"); }
        }

        function renderAtlas() {
            document.getElementById('atlas-list').innerHTML = DB.syndromes.map(s => `
                <div class="glass p-5 border-l-4 border-rose-500/50">
                    <h4 class="text-rose-400 font-bold mb-3">${s.n}</h4>
                    <p class="text-[10px] text-slate-400 mb-2 italic">Tratamiento: ${s.p}</p>
                    <p class="text-[9px] text-amber-500 font-bold uppercase tracking-widest">${s.d}</p>
                </div>
            `).join('');
        }

        function showSatori(m, t='success') { const s = document.getElementById('satori'); s.innerText=m; s.style.color=t==='success'?'var(--accent)':'var(--error)'; s.className='show'; setTimeout(()=>s.className='', 2500); }
        
        function shareQi() { if (navigator.share) { navigator.share({ title: 'Máster MTC Maidi', text: `He acumulado ${state.xp} QI Maidi. ¿Me superas?`, url: window.location.href }); } }

        // --- SERVICE WORKER (RETENCIÓN NATIVA) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').then(r => console.log('Qi SW')).catch(e => console.log('Qi Falló SW')); });
        }

        // Lógica de pérdida de Qi al cerrar
        let lossTimer;
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                lossTimer = setTimeout(() => {
                    // Si tienes el SW registrado, esto disparará una Push en Android
                    if ('serviceWorker' in navigator && Notification.permission === 'granted') {
                        navigator.serviceWorker.ready.then(reg => {
                            reg.showNotification('MÁSTER MTC: El Qi se dispersa', {
                                body: 'Tu linaje te necesita. Vuelve al Dojo o perderás rango.',
                                icon: 'https://cdn-icons-png.flaticon.com/512/1041/1041844.png',
                                vibrate: [300, 100, 300]
                            });
                        });
                    }
                    state.xp = Math.max(0, state.xp - 10); // Penalización
                    document.getElementById('xp-val').innerText = `${state.xp} QI`;
                }, 14400000); // 4 Horas
            } else { clearTimeout(lossTimer); }
        });

    </script>
</body>
</html>
